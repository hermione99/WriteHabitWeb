services:
  - type: web
    name: writehabit-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm start
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
