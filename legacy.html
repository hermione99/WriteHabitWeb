<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WriteHabit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@400;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2103@1.1/MaruBuri-Regular.woff2" rel="preload" as="font" type="font/woff2" crossorigin />
<style>
@font-face {
  font-family: 'MaruBuri';
  font-weight: 400;
  font-style: normal;
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2103@1.1/MaruBuri-Regular.woff2') format('woff2');
  font-display: swap;
}
@font-face {
  font-family: 'MaruBuri';
  font-weight: 700;
  font-style: normal;
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2103@1.1/MaruBuri-Bold.woff2') format('woff2');
  font-display: swap;
}
@font-face {
  font-family: 'KoPubWorldBatang';
  font-weight: 400;
  src: url('https://cdn.jsdelivr.net/gh/fonts-archive/KoPubWorldBatang/KoPubWorldBatangLight.woff2') format('woff2');
  font-display: swap;
}
@font-face {
  font-family: 'KoPubWorldBatang';
  font-weight: 700;
  src: url('https://cdn.jsdelivr.net/gh/fonts-archive/KoPubWorldBatang/KoPubWorldBatangBold.woff2') format('woff2');
  font-display: swap;
}
@font-face {
  font-family: 'SpoqaHanSansNeo';
  font-weight: 400;
  src: url('https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/Subset/SpoqaHanSansNeo/SpoqaHanSansNeo-Regular.woff2') format('woff2');
  font-display: swap;
}
@font-face {
  font-family: 'SpoqaHanSansNeo';
  font-weight: 600;
  src: url('https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/Subset/SpoqaHanSansNeo/SpoqaHanSansNeo-Medium.woff2') format('woff2');
  font-display: swap;
}
@font-face {
  font-family: 'SpoqaHanSansNeo';
  font-weight: 700;
  src: url('https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/Subset/SpoqaHanSansNeo/SpoqaHanSansNeo-Bold.woff2') format('woff2');
  font-display: swap;
}
</style>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper:       #f2efe7;
  --paper-2:     #e9e5da;
  --paper-3:     #ded9ca;
  --card:        #fbf9f3;
  --ink:         #1b1a15;
  --ink-soft:    #2e2c25;
  --ink-mute:    #6a6558;
  --ink-faint:   #a09a89;
  --rule:        #1b1a15;
  --rule-soft:   rgba(27,26,21,0.12);
  --rule-ghost:  rgba(27,26,21,0.06);
  --accent:      #d94615;
  --accent-soft: rgba(217,70,21,0.08);
  --f-serif:     'Fraunces', 'Noto Serif KR', ui-serif, Georgia, serif;
  --f-kr:        'Pretendard Variable', 'Pretendard', -apple-system, system-ui, sans-serif;
  --f-kr-serif:  'Gowun Batang', 'Noto Serif KR', ui-serif, serif;
  /* 키워드 전용 — 폰트 프리셋과 무관하게 항상 Gowun Batang 유지 */
  --f-kw:        'Gowun Batang', 'Noto Serif KR', ui-serif, serif;
}

/* Font combination presets — 1: 현재 (Gowun + Pretendard), 2: Maru Buri + Pretendard, 3: Noto Serif + Pretendard, 4: KoPub + Spoqa */
body.font-1 { /* 기본 (현재) */ }
body.font-2 {
  --f-kr-serif: 'MaruBuri', 'Gowun Batang', 'Noto Serif KR', ui-serif, serif;
}
body.font-3 {
  --f-kr-serif: 'Noto Serif KR', 'Gowun Batang', ui-serif, serif;
}
body.font-4 {
  --f-kr:       'SpoqaHanSansNeo', 'Pretendard Variable', 'Pretendard', system-ui, sans-serif;
  --f-kr-serif: 'KoPubWorldBatang', 'Noto Serif KR', 'Gowun Batang', ui-serif, serif;
  --f-latin:     'Inter Tight', 'Inter', Helvetica, Arial, sans-serif;
  --f-mono:      'JetBrains Mono', ui-monospace, Menlo, monospace;
}

body.dark {
  --paper:       #13120e;
  --paper-2:     #1a1914;
  --paper-3:     #22201a;
  --card:        #1b1a15;
  --ink:         #f2efe7;
  --ink-soft:    #ded9ca;
  --ink-mute:    #8e887a;
  --ink-faint:   #544f44;
  --rule:        #f2efe7;
  --rule-soft:   rgba(242,239,231,0.14);
  --rule-ghost:  rgba(242,239,231,0.06);
  --accent:      #ff6a36;
  --accent-soft: rgba(255,106,54,0.10);
}

html, body { height: 100%; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-kr);
  font-size: 15px;
  line-height: 1.55;
  letter-spacing: -0.01em;
  -webkit-font-smoothing: antialiased;
  transition: background 0.25s, color 0.25s;
}

#root { min-height: 100vh; }

/* ── Scrollbar ── */
*::-webkit-scrollbar { width: 6px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: var(--rule-soft); border-radius: 3px; }

/* ── Type utils ── */
.eyebrow {
  font-family: var(--f-latin);
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--ink-mute);
}
.label {
  font-family: var(--f-latin);
  font-size: 10.5px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--ink-mute);
}
.meta {
  font-family: var(--f-mono);
  font-size: 10.5px; letter-spacing: 0;
  color: var(--ink-mute);
}
.rule   { height: 1px; background: var(--rule);       width: 100%; }
.rule-s { height: 1px; background: var(--rule-soft);  width: 100%; }
.rule-g { height: 1px; background: var(--rule-ghost); width: 100%; }

/* ── Logo ── */
.logo {
  font-family: var(--f-serif);
  font-weight: 600; font-size: 22px;
  letter-spacing: -0.03em; color: var(--ink);
  display: inline-flex; align-items: baseline; gap: 2px;
  font-variation-settings: "opsz" 30;
  text-decoration: none; cursor: pointer;
  user-select: none;
}
.logo .w { font-weight: 700; }
.logo .h { color: var(--accent); }

/* ── Topbar ── */
.topbar {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 20px 40px 16px;
  border-bottom: 1px solid var(--rule-soft);
  position: sticky; top: 0; z-index: 100;
  background: var(--paper);
  transition: background 0.25s;
}
.tabs { display: flex; gap: 28px; }
.tabs button {
  font-family: var(--f-kr); font-size: 13px;
  text-decoration: none; color: var(--ink-mute);
  padding-bottom: 6px; letter-spacing: -0.005em;
  position: relative; background: none; border: none;
  cursor: pointer; transition: color 0.15s;
}
.tabs button:hover { color: var(--ink); }
.tabs button.active { color: var(--ink); }
.tabs button.active::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: -17px;
  height: 1.5px; background: var(--ink);
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  font-family: var(--f-kr); font-size: 12.5px; font-weight: 600;
  letter-spacing: -0.005em;
  border: 1px solid var(--ink);
  background: transparent; color: var(--ink);
  cursor: pointer; border-radius: 999px;
  text-decoration: none; transition: opacity 0.15s, background 0.15s;
  white-space: nowrap;
}
.btn:hover { opacity: 0.75; }
.btn.solid  { background: var(--ink);    color: var(--paper); }
.btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.ghost  { border-color: var(--rule-soft); color: var(--ink-soft); }
.btn.sm     { padding: 7px 12px; font-size: 11px; }
.btn .arr   { font-family: var(--f-mono); font-size: 13px; }

/* ── Chips ── */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; border: 1px solid var(--rule-soft);
  border-radius: 999px; font-family: var(--f-kr);
  font-size: 11.5px; color: var(--ink-mute);
  background: transparent; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.chip:hover  { border-color: var(--ink-mute); color: var(--ink-soft); }
.chip.active { border-color: var(--ink); color: var(--ink); background: var(--card); }
.chip.accent { border-color: var(--accent); color: var(--accent); }

/* ── Avatar ── */
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--paper-3);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--f-serif); font-size: 15px; font-weight: 600;
  color: var(--ink); flex-shrink: 0;
}

/* ── Panel ── */
.panel {
  background: var(--card); border: 1px solid var(--rule-soft);
  padding: 24px; border-radius: 2px;
}
.panel h4 {
  font-family: var(--f-latin); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.18em;
  margin: 0 0 16px; font-weight: 500; color: var(--ink-mute);
}

/* ── Input / Field ── */
.field {
  width: 100%; padding: 12px 0;
  background: transparent; border: none;
  border-bottom: 1px solid var(--rule-soft);
  font-family: var(--f-kr); font-size: 14px;
  color: var(--ink); letter-spacing: -0.005em;
  outline: none; border-radius: 0;
  transition: border-color 0.15s;
}
.field:focus { border-bottom-color: var(--ink); }
.field::placeholder { color: var(--ink-faint); }

/* ── Daily Keyword Hero ── */
.kw-hero {
  display: grid; grid-template-columns: 1fr auto;
  align-items: end; gap: 32px;
  padding: 22px 0 28px;
  border-bottom: 1px solid var(--rule-soft);
}
.kw-eyebrow {
  font-family: var(--f-latin); font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.22em;
  color: var(--ink-mute); margin-bottom: 14px;
  display: flex; gap: 12px; align-items: center;
}
.kw-eyebrow .dash { width: 24px; height: 1px; background: var(--ink-mute); }
.kw-title {
  font-family: var(--f-serif); font-weight: 500;
  font-size: 76px; line-height: 0.95; letter-spacing: -0.04em;
  color: var(--ink); font-variation-settings: "opsz" 72;
}
.kw-title .kor-serif { font-family: var(--f-kw); font-weight: 400; letter-spacing: -0.02em; }
.kw-sub {
  font-family: var(--f-kr); font-size: 14px;
  color: var(--ink-mute); max-width: 42ch;
  margin-top: 14px; line-height: 1.6;
}
.kw-side {
  text-align: right; display: flex;
  flex-direction: column; gap: 6px; min-width: 170px;
}
.kw-side .big {
  font-family: var(--f-latin); font-weight: 600;
  font-size: 44px; letter-spacing: -0.04em;
  line-height: 1; color: var(--ink);
  font-variant-numeric: tabular-nums;
}

/* ── Feed Entries ── */
.feed { padding-top: 12px; }
.entry {
  display: grid; grid-template-columns: 72px 1fr 140px;
  gap: 36px; padding: 28px 0 26px;
  border-bottom: 1px solid var(--rule-ghost);
  align-items: start; cursor: pointer;
  transition: background 0.15s;
}
.entry:hover { background: var(--card); margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
.entry .en  { font-family: var(--f-latin); font-weight: 500; font-size: 13px; color: var(--ink-mute); letter-spacing: 0.04em; font-variant-numeric: tabular-nums; padding-top: 3px; }
.entry h3   { font-family: var(--f-serif); font-weight: 500; font-size: 22px; line-height: 1.25; letter-spacing: -0.025em; margin: 0 0 8px; color: var(--ink); font-variation-settings: "opsz" 36; }
.entry h3 .kor-serif { font-family: var(--f-kr-serif); font-weight: 400; letter-spacing: -0.015em; }
.entry p    { margin: 0; font-family: var(--f-kr); font-size: 14.5px; line-height: 1.75; color: var(--ink-soft); letter-spacing: -0.008em; max-width: 58ch; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.byline     { margin-top: 14px; display: flex; gap: 14px; align-items: center; font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); }
.byline .author { font-family: var(--f-kr); font-weight: 600; font-size: 12px; color: var(--ink-soft); letter-spacing: -0.005em; }
.byline .sep    { opacity: 0.4; }
.stats   { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); }
.stats .row { display: inline-flex; gap: 8px; align-items: center; cursor: pointer; }
.stats .row:hover { color: var(--ink); }
.stats .n   { color: var(--ink); font-weight: 500; font-variant-numeric: tabular-nums; }
.stats .on  { color: var(--accent); }

/* ── Editor ── */
.editor-shell { background: var(--card); border: 1px solid var(--rule-soft); border-radius: 2px; }
.editor-toolbar { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--rule-ghost); gap: 0; flex-wrap: wrap; }
.toolbar-group { display: flex; align-items: center; gap: 2px; padding-right: 10px; margin-right: 10px; border-right: 1px solid var(--rule-ghost); }
.toolbar-group:last-child { border-right: none; margin-right: 0; padding-right: 0; margin-left: auto; }
.tbtn {
  width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: none; border-radius: 4px; cursor: pointer;
  font-family: var(--f-latin); font-size: 12px; font-weight: 500; color: var(--ink-soft);
  transition: background 0.1s;
}
.tbtn:hover  { background: var(--paper-2); }
.tbtn.active { background: var(--paper-2); color: var(--ink); }
.tsel {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px; border: 1px solid var(--rule-soft);
  border-radius: 4px; font-family: var(--f-latin);
  font-size: 11.5px; color: var(--ink-soft); background: var(--paper);
  cursor: pointer;
}
.editor-body {
  padding: 32px 36px; min-height: 280px;
  font-family: var(--f-kr); font-size: 16px;
  line-height: 1.85; color: var(--ink-soft);
  letter-spacing: -0.005em; outline: none;
}
.editor-body:empty::before { content: attr(data-placeholder); color: var(--ink-faint); }
.editor-body h1 { font-family: var(--f-kr-serif); font-size: 28px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.25; margin: 0.5em 0 0.4em; color: var(--ink); }
.editor-body h2 { font-family: var(--f-kr-serif); font-size: 22px; font-weight: 700; letter-spacing: -0.02em;  line-height: 1.3;  margin: 0.5em 0 0.4em; color: var(--ink); }
.editor-body blockquote { margin: 1em 0; padding: 4px 0 4px 18px; border-left: 2px solid var(--accent); font-style: italic; color: var(--ink); }
.editor-body ul, .editor-body ol { padding-left: 1.4em; margin: 0.6em 0; }
.editor-body li { margin: 0.2em 0; }
.editor-body a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
.editor-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px; border-top: 1px solid var(--rule-ghost);
  font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute);
}

/* ── Comment ── */
.comment { display: grid; grid-template-columns: 36px 1fr; gap: 14px; padding: 18px 0; border-bottom: 1px solid var(--rule-ghost); }
.c-head  { display: flex; gap: 10px; align-items: baseline; margin-bottom: 4px; }
.c-author { font-family: var(--f-kr); font-weight: 600; font-size: 13px; color: var(--ink); }
.c-time   { font-family: var(--f-mono); font-size: 10.5px; color: var(--ink-faint); }
.c-body   { font-family: var(--f-kr); font-size: 14px; line-height: 1.7; color: var(--ink-soft); letter-spacing: -0.008em; }
.c-actions { margin-top: 8px; display: flex; gap: 14px; font-family: var(--f-mono); font-size: 10.5px; color: var(--ink-mute); }
.c-actions span { cursor: pointer; }
.c-actions span:hover { color: var(--ink); }

/* ── Calendar ── */
.cal { display: grid; grid-template-columns: repeat(14, 1fr); gap: 6px; }
.cal .d {
  aspect-ratio: 1; border: 1px solid var(--rule-ghost);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-mono); font-size: 9px; color: var(--ink-faint);
  cursor: pointer; transition: background 0.15s;
}
.cal .d.on       { background: var(--ink);    color: var(--paper); border-color: var(--ink); }
.cal .d.on-light { background: var(--paper-3); color: var(--ink);  border-color: transparent; }
.cal .d.today    { background: var(--accent); color: #fff;         border-color: var(--accent); }
.cal .d:hover:not(.today):not(.on) { background: var(--paper-2); }

/* ── Streak bars ── */
.streak { display: grid; grid-template-columns: repeat(30, 1fr); gap: 3px; align-items: end; height: 80px; }
.streak .b { background: var(--paper-3); width: 100%; border-radius: 1px; transition: background 0.2s; }
.streak .b.on    { background: var(--ink); }
.streak .b.today { background: var(--accent); }

/* ── Keyword row ── */
.kw-row { display: grid; grid-template-columns: 80px 1fr 80px 120px; gap: 24px; padding: 18px 0; border-bottom: 1px solid var(--rule-ghost); align-items: center; cursor: pointer; }
.kw-row:hover { background: var(--card); margin: 0 -12px; padding-left: 12px; padding-right: 12px; }
.kdate { font-family: var(--f-mono); font-size: 11px; color: var(--ink-mute); }
.kword { font-family: var(--f-serif); font-weight: 500; font-size: 24px; letter-spacing: -0.03em; color: var(--ink); }
.kword .kor-serif { font-family: var(--f-kw); font-weight: 400; letter-spacing: -0.01em; }
.kcount { font-family: var(--f-latin); font-weight: 500; font-size: 14px; color: var(--ink); font-variant-numeric: tabular-nums; text-align: right; }
.kcount small { font-family: var(--f-latin); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.1em; display: block; }

/* ── Col header ── */
.col-h { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 10px; border-bottom: 1px solid var(--rule); margin-bottom: 18px; }
.col-h h2 { font-family: var(--f-serif); font-weight: 500; font-size: 20px; letter-spacing: -0.025em; margin: 0; color: var(--ink); }
.col-h h2 .kor-serif { font-family: var(--f-kr-serif); font-weight: 400; }

/* ── Field error ── */
.field.error { border-bottom-color: #c0392b; }
.field-err { font-family: var(--f-mono); font-size: 10.5px; color: #c0392b; margin-top: 5px; display: block; }

/* ── Checkbox ── */
.cb-box {
  width: 13px; height: 13px; border: 1px solid var(--ink);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 9px; flex-shrink: 0; cursor: pointer; transition: background 0.1s;
}
.cb-box.checked { background: var(--ink); color: var(--paper); }

/* ── Loading spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 12px; height: 12px; border: 1.5px solid currentColor;
  border-top-color: transparent; border-radius: 50%;
  animation: spin 0.6s linear infinite; display: inline-block;
}

/* ── Toast ── */
.toast-wrap {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  z-index: 999; display: flex; flex-direction: column; gap: 10px; align-items: center;
  pointer-events: none;
}
.toast {
  background: var(--ink); color: var(--paper);
  font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.02em;
  padding: 10px 20px; border-radius: 999px;
  animation: toast-in 0.2s ease, toast-out 0.3s ease 2.2s forwards;
  pointer-events: none;
}
.toast.error { background: #c0392b; }
@keyframes toast-in  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes toast-out { from { opacity:1; } to { opacity:0; transform:translateY(4px); } }

/* ── Inline reset-pw panel ── */
.reset-panel {
  background: var(--paper-2); border: 1px solid var(--rule-soft);
  padding: 20px; border-radius: 2px; margin-bottom: 24px;
}

/* ── Dark mode toggle ── */
.dark-toggle {
  width: 32px; height: 32px; border-radius: 999px;
  border: 1px solid var(--rule-soft); background: transparent;
  color: var(--ink-soft); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.dark-toggle:hover { background: var(--paper-2); color: var(--ink); }

/* ── Wrap ── */
.wrap        { padding: 40px 56px; max-width: 1300px; margin: 0 auto; }
.wrap-narrow { padding: 40px 120px; max-width: 960px; margin: 0 auto; }

/* ── Article body ── */
.article-body {
  font-family: var(--f-kr-serif); font-size: 18px; line-height: 1.95;
  color: var(--ink-soft); letter-spacing: -0.005em; max-width: 62ch;
}
.article-body p     { margin: 0 0 1.4em; }
.article-body blockquote {
  margin: 1.6em 0; padding: 8px 0 8px 24px;
  border-left: 2px solid var(--accent);
  font-style: italic; color: var(--ink); font-size: 19px;
}

/* ── Tag / status chip ── */
.status-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 9px; border-radius: 999px; border: 1px solid;
  font-family: var(--f-latin); font-size: 10px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
}

/* ── Notification dot ── */
.notif-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; }

/* ── Login layout ── */
.login-grid { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
.login-left {
  background: var(--paper-2); padding: 56px 52px;
  display: flex; flex-direction: column; justify-content: space-between;
  border-right: 1px solid var(--rule-soft);
}
.login-right { padding: 56px 80px; display: flex; flex-direction: column; justify-content: center; }

/* ── Responsive: tablet ── */
@media (max-width: 900px) {
  .topbar { padding: 16px 20px 12px; }
  .wrap   { padding: 24px 20px; }
  .wrap-narrow { padding: 24px 20px; }
  .kw-title { font-size: 48px; }
  .entry { grid-template-columns: 48px 1fr; }
  .entry .stats { display: none; }
  .login-grid { grid-template-columns: 1fr; }
  .login-left  { display: none; }
}

/* ── Responsive: mobile ── */
@media (max-width: 720px) {
  /* TopBar: condense, drop date and shrink tabs */
  .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }

const ToastProvider = ({children}) => {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='info') => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2500);
  }, []);
  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t => <div key={t.id} className={`toast${t.type==='error'?' error':''}`}>{t.msg}</div>)}
      </div>

/* Mulberry32: deterministic seeded PRNG */
function _mulberry32(seed) {
  return function () {
    seed = (seed + 0x6D2B79F5) | 0;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function _shuffleSeeded(arr, seed) {
  const rng = _mulberry32(seed);
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const FeedScreen = ({onNav, posts, onToggleLike, onToggleBookmark, blocks, follows, onToggleFollow, onReport, onBlockAuthor}) => {
  const toast = useToast();
  const [filter, setFilter] = useState('최신');
  const [showExtra, setShowExtra] = useState(false);
  const [query, setQuery] = useState('');
  const [openMenuId, setOpenMenuId] = useState(null);
  const [reportTarget, setReportTarget] = useState(null);
  const filters = ['최신','인기','팔로잉','짧은 글','긴 글'];
  const blockedCount = blocks?.size || 0;

  const handleFilter = (f) => {
    if (f === '팔로잉' && (!follows || follows.size === 0)) {
      toast('아직 팔로우한 작가가 없습니다. 글을 읽고 작가를 팔로우해보세요!');
      return;
    }
    setFilter(f);
  };

  const allPosts = showExtra ? [...posts, ...EXTRA_POSTS] : posts;
  const sorted = filter === '인기'
    ? [...allPosts].sort((a,b) => b.likes - a.likes)
    : filter === '짧은 글'
    ? [...allPosts].sort((a,b) => parseInt(a.read) - parseInt(b.read))
    : filter === '긴 글'
    ? [...allPosts].sort((a,b) => parseInt(b.read) - parseInt(a.read))
    : filter === '팔로잉'
    ? allPosts.filter(p => follows?.has(p.handle))
    : allPosts;

  const q = query.trim().toLowerCase();
  const visible = q
    ? sorted.filter(p =>
        p.title.toLowerCase().includes(q) ||
        p.body.toLowerCase().includes(q) ||
        p.author.toLowerCase().includes(q) ||
        (p.handle || '').toLowerCase().includes(q)
      )
    : sorted;

  return (
    <div onClick={() => openMenuId !== null && setOpenMenuId(null)}>
      <ReportModal
        open={!!reportTarget}
        target={reportTarget}
        onClose={() => setReportTarget(null)}
        onSubmit={({reason, detail}) => onReport({
          targetType: reportTarget.type, targetId: reportTarget.id,
          targetHandle: reportTarget.handle, reason, detail,
        })}
      />
      <div className="wrap">
        {blockedCount > 0 && (
          <div style={{
            display:'flex', justifyContent:'space-between', alignItems:'center', gap:12,
            padding:'8px 14px', marginTop:14,
            border:'1px solid var(--rule-soft)', background:'var(--paper-2)',
            fontFamily:'var(--f-mono)', fontSize:11, color:'var(--ink-mute)',
          }}>
            <span>차단된 작가 {blockedCount}명의 글을 숨기고 있습니다.</span>
            <button className="btn sm ghost" style={{padding:'3px 8px', fontSize:10.5}}
              onClick={() => onNav('profile')}>차단 관리 →</button>
          </div>
        )}
        {/* Hero */}
        <section className="kw-hero">
          <div>
            <div className="kw-eyebrow">
              <span className="dash"></span>
              <span>오늘의 키워드 · Daily Keyword · No. {TODAY_KW.no}</span>
            </div>
            <h1 className="kw-title">
              <span className="kor-serif">{TODAY_KW.word}</span>
              <span style={{color:'var(--ink-faint)', fontWeight:300, fontSize:54, marginLeft:18}}>{TODAY_KW.eng.charAt(0) + TODAY_KW.eng.slice(1).toLowerCase()}</span>
            </h1>
            <p className="kw-sub">{TODAY_KW.sub}</p>
          </div>
          <div className="kw-side">
            <span className="label" style={{marginBottom:4}}>오늘 작성된 글</span>
            <span className="big">1,247</span>
            <span className="meta">마감까지 · 14H 32M</span>
            <button className="btn accent sm" style={{marginTop:10, alignSelf:'flex-end'}} onClick={() => onNav('write')}>
              오늘의 글 쓰기 <span className="arr">→</span>
            </button>
          </div>
        </section>

        {/* Filter + search */}
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:16, padding:'20px 0 8px'}}>
          <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>

              <button key={f} className={`chip${filter===f?' active':''}`} onClick={() => handleFilter(f)}>{f}</button>
            ))}

            <div style={{position:'relative'}}>
              <input
                value={query}
                onChange={e => setQuery(e.target.value)}
                placeholder="제목 · 본문 · 작가 검색"
                style={{
                  width:240, padding:'7px 28px 7px 12px',
                  border:'1px solid var(--rule-soft)', background:'var(--paper)',
                  fontFamily:'var(--f-kr)', fontSize:12, color:'var(--ink)',
                  outline:'none',
                }}
                onFocus={e => e.target.style.borderColor='var(--ink-mute)'}
                onBlur={e => e.target.style.borderColor='var(--rule-soft)'}
              />
              {query && (
                <button onClick={() => setQuery('')} style={{
                  position:'absolute', right:8, top:'50%', transform:'translateY(-50%)',
                  background:'none', border:'none', color:'var(--ink-faint)', cursor:'pointer',
                  fontSize:14, padding:0, lineHeight:1,
                }} title="지우기">×</button>
              )}
            </div>
            <div className="meta" style={{fontSize:11, whiteSpace:'nowrap'}}>
              {q ? `검색 · ${visible.length}편` : `정렬 · ${{'최신':'최신순','인기':'인기순','짧은 글':'짧은 글 순','긴 글':'긴 글 순','팔로잉':'최신순'}[filter]}`}
            </div>
          </div>
        </div>

        {/* Feed */}
        <div className="feed">
          {visible.length === 0 && (
            <div style={{padding:'72px 0', textAlign:'center', color:'var(--ink-mute)'}}>
              {q ? (
                <>
                  <div style={{fontFamily:'var(--f-kr-serif)', fontSize:22, fontWeight:700, color:'var(--ink)', marginBottom:8}}>검색 결과 없음</div>
                  <div style={{fontFamily:'var(--f-mono)', fontSize:11.5}}>"{query}" — 일치하는 글을 찾을 수 없습니다.</div>
                  <button className="btn sm ghost" style={{marginTop:18}} onClick={() => setQuery('')}>검색 지우기</button>
                </>
              ) : filter === '팔로잉' ? (
                <>
                  <div style={{fontFamily:'var(--f-kr-serif)', fontSize:22, fontWeight:700, color:'var(--ink)', marginBottom:8}}>팔로우한 작가의 새 글이 없습니다</div>
                  <div style={{fontFamily:'var(--f-mono)', fontSize:11.5}}>아직 올라온 글이 없어요. 다른 작가도 둘러보세요.</div>
                  <button className="btn sm ghost" style={{marginTop:18}} onClick={() => setFilter('최신')}>전체 보기</button>
                </>
              ) : (
                <div style={{fontFamily:'var(--f-mono)', fontSize:11.5}}>표시할 글이 없습니다.</div>
              )}
            </div>
          )}
          {visible.map((p, i) => (
            <article className="entry" key={p.id} onClick={() => onNav('detail', p)}>
              <div className="en">
                {String(i+1).padStart(2,'0')} <span style={{opacity:0.5}}>/ {visible.length}</span>
              </div>
              <div>
                <h3><span className="kor-serif">{p.title}</span></h3>
                <p>{p.body}</p>
                <div className="byline">
                  <div className="avatar" style={{width:26,height:26,fontSize:11,cursor:'pointer'}}
                    onClick={e => { e.stopPropagation(); onNav('profile', p); }}>{p.initial}</div>
                  <span className="author" style={{cursor:'pointer'}} onClick={e => { e.stopPropagation(); onNav('profile', p); }}>{p.author}</span>
                  <span className="sep">·</span>
                  <span>@{p.handle}</span>
                  <span className="sep">·</span>
                  <span>{p.time}</span>
                  <span className="sep">·</span>
                  <span>읽기 {p.read}</span>
                </div>
              </div>
              <div className="stats" onClick={e => e.stopPropagation()} style={{position:'relative'}}>
                <span className="row" onClick={() => onToggleLike(p.id)} style={{color: p.liked ? 'var(--accent)' : undefined}}>
                  <IconHeart filled={p.liked} />
                  <span className={p.liked ? 'n on' : 'n'}>{p.likes}</span>
                </span>
                <span className="row" onClick={() => onNav('detail', p)}>
                  <IconComment /><span className="n">{p.comments}</span>
                </span>
                <span className="row" onClick={() => onToggleBookmark(p.id)} style={{color: p.bookmarked ? 'var(--accent)' : undefined}}>
                  <IconBookmark filled={p.bookmarked} /><span className={p.bookmarked ? 'n on' : 'n'}>{p.bookmarks}</span>
                </span>
                <span className="row" style={{cursor:'pointer'}} title="더보기"
                  onClick={e => { e.stopPropagation(); setOpenMenuId(openMenuId === p.id ? null : p.id); }}>
                  <span style={{fontSize:13, lineHeight:1, color:'var(--ink-mute)'}}>⋯</span>
                </span>
                {openMenuId === p.id && (
                  <div style={{position:'absolute', right:0, top:'calc(100% + 6px)', zIndex:30,
                    background:'var(--card)', border:'1px solid var(--rule-soft)', borderRadius:4,
                    boxShadow:'0 8px 24px rgba(0,0,0,0.08)', minWidth:170,
                  }}>
                    <button onClick={() => { setOpenMenuId(null); setReportTarget({type:'post', id:p.id, handle:p.handle, label:`${p.author}님의 "${p.title}"`}); }}
                      style={{display:'block', width:'100%', textAlign:'left', padding:'10px 14px', background:'none', border:'none', fontFamily:'var(--f-kr)', fontSize:13, color:'var(--ink-soft)', cursor:'pointer'}}>이 글 신고</button>
                    <button onClick={() => { setOpenMenuId(null); if (window.confirm(`${p.author}님을 차단하시겠어요?`)) onBlockAuthor(p.handle); }}
                      style={{display:'block', width:'100%', textAlign:'left', padding:'10px 14px', background:'none', border:'none', fontFamily:'var(--f-kr)', fontSize:13, color:'var(--accent)', cursor:'pointer', borderTop:'1px solid var(--rule-ghost)'}}>@{p.handle} 차단</button>
                  </div>
                )}
              </div>
            </article>
          ))}
          {visible.length > 0 && (
            <div style={{textAlign:'center', padding:'32px 0 16px'}}>
              {!q && !showExtra
                ? <button className="btn ghost" onClick={() => setShowExtra(true)}>더 많은 글 보기 <span className="arr">↓</span></button>
                : <span className="meta">{q ? `검색 결과 · ${visible.length}편` : `모든 글을 불러왔습니다 · ${visible.length}편`}</span>
              }
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════
   SCREEN 2 — WRITE
══════════════════════════════ */
const DRAFT_KEY = 'wh_draft';

const WriteScreen = ({onNav, onPublish, dark, onToggleDark, user, editingPost, onUpdatePost, onClearEditing}) => {
  const isEditing = !!editingPost;
  const toast = useToast();
  const [title, setTitle] = useState('');
  const [charCount, setCharCount] = useState(0);
  const editorRef = useRef(null);
  const [saving, setSaving] = useState(false);
  const [lastSavedAt, setLastSavedAt] = useState(null); // Date | null
  const [savedTick, setSavedTick] = useState(0); // re-render the "N분 전" label
  /* unified toolbar state — one source of truth for all formatting toggles */
  const [tools, setTools] = useState({
    bold:false, italic:false, underline:false, strike:false,
    h1:false, h2:false, blockquote:false,
    ul:false, ol:false,
    alignL:false, alignC:false, alignR:false,
    block:'본문',  /* dropdown label */
  });
  const refreshTools = () => {
    if (!editorRef.current) return;
    const isBlock = (tag) => {
      try { return document.queryCommandValue('formatBlock')?.toUpperCase() === tag; } catch { return false; }
    };
    const h1 = isBlock('H1');
    const h2 = isBlock('H2');
    const bq = isBlock('BLOCKQUOTE');
    setTools({
      bold:      document.queryCommandState('bold'),
      italic:    document.queryCommandState('italic'),
      underline: document.queryCommandState('underline'),
      strike:    document.queryCommandState('strikeThrough'),
      h1, h2, blockquote: bq,
      ul:     document.queryCommandState('insertUnorderedList'),
      ol:     document.queryCommandState('insertOrderedList'),
      alignL: document.queryCommandState('justifyLeft'),
      alignC: document.queryCommandState('justifyCenter'),
      alignR: document.queryCommandState('justifyRight'),
      block:  h1 ? '제목 1' : h2 ? '제목 2' : bq ? '인용구' : '본문',
    });
  };
  /* listen to selection changes anywhere → keep toolbar in sync */
  useEffect(() => {
    const onSel = () => {
      const sel = window.getSelection();
      if (sel && editorRef.current && editorRef.current.contains(sel.anchorNode)) {
        refreshTools();
      }
    };
    document.addEventListener('selectionchange', onSel);
    return () => document.removeEventListener('selectionchange', onSel);
  }, []);
  const [blockMenuOpen, setBlockMenuOpen] = useState(false);
  const [commentsOn, setCommentsOn] = useState(true);
  const [visibility, setVisibility] = useState('전체 공개');
  const [visMenuOpen, setVisMenuOpen] = useState(false);
  const [restored, setRestored] = useState(false);
  const VISIBILITIES = ['전체 공개', '팔로워 공개', '나만 보기'];

  /* Restore draft (or load editingPost) on mount */
  useEffect(() => {
    if (isEditing) {
      setTitle(editingPost.title || '');
      if (editorRef.current) {
        /* preserve original whitespace by using textContent → contenteditable */
        editorRef.current.innerHTML = '';
        editorRef.current.innerText = editingPost.body || '';
        setCharCount((editingPost.body || '').length);
      }
      return;
    }
    try {
      const raw = localStorage.getItem(DRAFT_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      if (d.title) setTitle(d.title);
      if (d.commentsOn !== undefined) setCommentsOn(d.commentsOn);
      if (d.visibility) setVisibility(d.visibility);
      if (d.bodyHTML && editorRef.current) {
        editorRef.current.innerHTML = d.bodyHTML;
        setCharCount((editorRef.current.innerText || '').length);
      }
      if (d.savedAt) setLastSavedAt(new Date(d.savedAt));
      if (d.title || d.bodyHTML) setRestored(true);
    } catch {}
  }, [isEditing]);

  /* Auto-save (debounced) on title / body / settings change */
  const writeDraft = (extra = {}) => {
    try {
      const bodyHTML = editorRef.current?.innerHTML || '';
      const text     = editorRef.current?.innerText || '';
      if (!title.trim() && !text.trim()) {
        localStorage.removeItem(DRAFT_KEY);
        setLastSavedAt(null);
        return;
      }
      const now = new Date();
      localStorage.setItem(DRAFT_KEY, JSON.stringify({
        title, bodyHTML, commentsOn, visibility, savedAt: now.toISOString(), ...extra,
      }));
      setLastSavedAt(now);
    } catch {}
  };
  const writeDraftRef = useRef(writeDraft);
  writeDraftRef.current = writeDraft;

  useEffect(() => {
    if (isEditing) return; /* 편집 중에는 글로벌 드래프트를 덮지 않음 */
    const id = setTimeout(() => writeDraftRef.current(), 800);
    return () => clearTimeout(id);
  }, [title, charCount, commentsOn, visibility, isEditing]);

  /* Tick once a minute so the "N분 전" label updates without typing */
  useEffect(() => {
    const id = setInterval(() => setSavedTick(t => t + 1), 60000);
    return () => clearInterval(id);
  }, []);

  const formatSavedLabel = () => {
    if (saving) return '저장 중…';
    if (!lastSavedAt) return '자동 저장 대기';
    const diffSec = Math.floor((Date.now() - lastSavedAt.getTime()) / 1000);
    if (diffSec < 5)   return '저장됨 ✓';
    if (diffSec < 60)  return `자동 저장 · ${diffSec}초 전`;
    const diffMin = Math.floor(diffSec / 60);
    if (diffMin < 60)  return `자동 저장 · ${diffMin}분 전`;
    return `자동 저장 · ${Math.floor(diffMin / 60)}시간 전`;
  };
  void savedTick; // keep ESLint happy

  const [timeLeft, setTimeLeft] = useState('');
  useEffect(() => {
    const tick = () => {
      const now = new Date();
      const end = new Date();
      end.setHours(23, 59, 59, 0);
      const diff = end - now;
      if (diff <= 0) { setTimeLeft('마감'); return; }
      const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
      const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
      const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
      setTimeLeft(`${h}H ${m}M ${s}S`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  const handleInput = () => {
    const text = editorRef.current?.innerText || '';
    setCharCount(text.length);
  };

  const execCmd = (cmd, val) => {
    document.execCommand(cmd, false, val ?? null);
    editorRef.current?.focus();
    refreshTools();
  };

  const setBlock = (tag) => {
    /* H1/H2/BLOCKQUOTE/P 토글 — 같은 블록이면 본문(P)으로 되돌림 */
    const cur = (document.queryCommandValue('formatBlock') || '').toUpperCase();
    const next = (cur === tag) ? 'P' : tag;
    document.execCommand('formatBlock', false, `<${next}>`);
    editorRef.current?.focus();
    refreshTools();
    setBlockMenuOpen(false);
  };

  const insertLink = () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) {
      toast('링크로 만들 텍스트를 먼저 선택해주세요.');
      return;
    }
    const url = window.prompt('링크 주소를 입력하세요', 'https://');
    if (!url || url === 'https://') return;
    document.execCommand('createLink', false, url);
    editorRef.current?.focus();
    refreshTools();
  };

  const removeFormat = () => {
    document.execCommand('removeFormat');
    document.execCommand('formatBlock', false, '<P>');
    editorRef.current?.focus();
    refreshTools();
  };

  const handleSave = () => {
    setSaving(true);
    setTimeout(() => { writeDraftRef.current(); setSaving(false); toast('임시저장되었습니다 ✓'); }, 400);
  };

  const handleDiscardDraft = () => {
    localStorage.removeItem(DRAFT_KEY);
    setTitle('');
    if (editorRef.current) editorRef.current.innerHTML = '';
    setCharCount(0);
    setLastSavedAt(null);
    setRestored(false);
    toast('임시저장이 삭제되었습니다.');
  };

  const [confirming, setConfirming] = useState(false);

  /* Keyboard shortcuts: ⌘/Ctrl+Enter → publish, Esc → close modals/discard */
  const handlePublishRef = useRef(null);
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        if (confirming) { handlePublishRef.current?._confirm(); }
        else            { handlePublishRef.current?._open();    }
      } else if (e.key === 'Escape') {
        if (confirming) { e.preventDefault(); setConfirming(false); }
        else if (visMenuOpen) { e.preventDefault(); setVisMenuOpen(false); }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [confirming, visMenuOpen]);

  const handlePublish = () => {
    const body = editorRef.current?.innerText?.trim() || '';
    if (!title.trim() && !body) { toast('제목과 내용을 입력해주세요.', 'error'); return; }
    if (!title.trim())           { toast('제목을 입력해주세요.', 'error'); return; }
    if (!body)                   { toast('내용을 입력해주세요.', 'error'); return; }
    setConfirming(true);
  };

  const confirmPublish = () => {
    const body = editorRef.current?.innerText?.trim() || '';
    setConfirming(false);
    if (isEditing) {
      onUpdatePost(editingPost.id, { title, body });
      onClearEditing();
      toast('글이 수정되었습니다 ✓');
      onNav('detail', { ...editingPost, title, body });
    } else {
      onPublish({ title, body });
      localStorage.removeItem(DRAFT_KEY);
      toast('글이 발행되었습니다 ✓');
      onNav('feed');
    }
  };

  /* expose to keyboard shortcut handler */
  handlePublishRef.current = { _open: handlePublish, _confirm: confirmPublish };

  const readMin = Math.max(1, Math.ceil(charCount / 350));

  return (
    <div onClick={() => blockMenuOpen && setBlockMenuOpen(false)}>
      <TopBar active="write" onNav={onNav} dark={dark} onToggleDark={onToggleDark} right={
        <div style={{display:'flex', alignItems:'center', gap:12}}>
          <span className="meta" style={{fontSize:11}}>{isEditing ? '편집 모드' : formatSavedLabel()}</span>
          <button className="btn sm ghost" onClick={() => {
            const body = editorRef.current?.innerText?.trim() || '';
            const dirty = isEditing
              ? (title !== editingPost.title || body !== (editingPost.body || '').trim())
              : (title.trim() || body);
            if (dirty && !window.confirm(isEditing ? '수정한 내용을 버리고 나가시겠어요?' : '작성 중인 글을 버리고 나가시겠어요?')) return;
            if (isEditing) onClearEditing();
            onNav(isEditing ? 'detail' : 'feed', isEditing ? editingPost : undefined);
          }}>취소</button>
          {!isEditing && <button className="btn sm" onClick={handleSave}>임시저장</button>}
          <button className="btn sm accent" onClick={handlePublish} title="⌘+Enter">
            {isEditing ? '수정 완료' : '발행하기'} <span className="arr">→</span>
          </button>
        </div>
      }/>
      <div className="wrap-narrow" style={{paddingTop:40}}>
        {isEditing && (
          <div style={{
            display:'flex', justifyContent:'space-between', alignItems:'center', gap:12,
            padding:'10px 14px', marginBottom:20,
            border:'1px solid var(--ink-mute)', background:'var(--paper-2)',
            fontFamily:'var(--f-kr)', fontSize:12.5, color:'var(--ink-soft)',
          }}>
            <span>이전에 발행한 글을 편집 중입니다 <span className="meta" style={{marginLeft:6}}>· {editingPost.time}</span></span>
            <span className="meta" style={{fontSize:10.5}}>NO. {String(editingPost.id).slice(-4)}</span>
          </div>
        )}
        {!isEditing && restored && (
          <div style={{
            display:'flex', justifyContent:'space-between', alignItems:'center', gap:12,
            padding:'10px 14px', marginBottom:20,
            border:'1px solid var(--accent)', background:'var(--accent-soft)',
            fontFamily:'var(--f-kr)', fontSize:12.5, color:'var(--ink-soft)',
          }}>
            <span>이전에 작성하던 글을 불러왔습니다 {lastSavedAt && <span className="meta" style={{marginLeft:6}}>· {formatSavedLabel()}</span>}</span>
            <span style={{display:'flex', gap:8}}>
              <button className="btn sm ghost" style={{padding:'4px 10px', fontSize:10.5}} onClick={() => setRestored(false)}>이어쓰기</button>
              <button className="btn sm ghost" style={{padding:'4px 10px', fontSize:10.5, color:'var(--accent)'}} onClick={handleDiscardDraft}>새로 시작</button>
            </span>
          </div>
        )}
        {/* Keyword strip */}
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', paddingBottom:20, borderBottom:'1px solid var(--rule-soft)', marginBottom:28}}>
          <div>
            <div className="eyebrow" style={{marginBottom:8}}>오늘의 키워드 · No. {TODAY_KW.no}</div>
            <div style={{fontFamily:'var(--f-kw)', fontSize:36, fontWeight:400, letterSpacing:'-0.02em', color:'var(--ink)'}}>
              {TODAY_KW.word} <span style={{color:'var(--ink-faint)', fontFamily:'var(--f-serif)', fontSize:22, marginLeft:8}}>{TODAY_KW.eng.charAt(0) + TODAY_KW.eng.slice(1).toLowerCase()}</span>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div className="meta" style={{fontSize:10.5}}>마감 · 23:59</div>
            <div className="meta" style={{fontSize:10.5}}>{timeLeft} 남음</div>
          </div>
        </div>

        {/* Title */}
        <input
          className="field"
          placeholder="제목을 입력하세요"
          value={title}
          onChange={e => setTitle(e.target.value)}
          style={{fontFamily:'var(--f-kr-serif)', fontSize:32, fontWeight:400, letterSpacing:'-0.02em', padding:'8px 0', borderBottom:'none', marginBottom:4, width:'100%'}}
        />
        <div className="rule-s" style={{marginBottom:22}}></div>

        {/* Editor */}
        <div className="editor-shell">
          <div className="editor-toolbar">
            {/* 블록 타입 셀렉트 */}
            <div className="toolbar-group" style={{position:'relative'}}>
              <div className="tsel" style={{cursor:'pointer', userSelect:'none'}}
                onClick={() => setBlockMenuOpen(o => !o)} title="블록 타입">
                <span>{tools.block}</span>
                <span style={{color:'var(--ink-mute)', fontSize:9, marginLeft:4}}>▾</span>
              </div>
              {blockMenuOpen && (
                <div style={{
                  position:'absolute', top:'calc(100% + 6px)', left:0, zIndex:30,
                  background:'var(--card)', border:'1px solid var(--rule-soft)',
                  boxShadow:'0 8px 24px rgba(0,0,0,0.08)', minWidth:140,
                }} onClick={e => e.stopPropagation()}>
                  {[
                    ['P',          '본문',   {fontSize:14, fontFamily:'var(--f-kr)'}],
                    ['H1',         '제목 1', {fontSize:18, fontFamily:'var(--f-kr-serif)', fontWeight:700}],
                    ['H2',         '제목 2', {fontSize:16, fontFamily:'var(--f-kr-serif)', fontWeight:700}],
                    ['BLOCKQUOTE', '인용구', {fontSize:14, fontFamily:'var(--f-kr-serif)', fontStyle:'italic', color:'var(--accent)'}],
                  ].map(([tag, label, st]) => (
                    <button key={tag} onMouseDown={e => { e.preventDefault(); setBlock(tag); }}
                      style={{display:'block', width:'100%', textAlign:'left', padding:'10px 14px',
                        background:'none', border:'none', cursor:'pointer', color:'var(--ink-soft)',
                        ...st}}>
                      {label}
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* 텍스트 서식 */}
            <div className="toolbar-group">
              <button className={`tbtn${tools.bold?' active':''}`}      onMouseDown={e=>{e.preventDefault();execCmd('bold')}}        title="굵게 (⌘B)"><b>B</b></button>
              <button className={`tbtn${tools.italic?' active':''}`}    onMouseDown={e=>{e.preventDefault();execCmd('italic')}}      title="기울임 (⌘I)" style={{fontStyle:'italic', fontFamily:'var(--f-serif)'}}>I</button>
              <button className={`tbtn${tools.underline?' active':''}`} onMouseDown={e=>{e.preventDefault();execCmd('underline')}}   title="밑줄 (⌘U)" style={{textDecoration:'underline'}}>U</button>

const OnboardingOverlay = ({onDone, onSkip, onNav}) => {
  const [step, setStep] = useState(0);
  const s = ONBOARDING_STEPS[step];
  const isLast = step === ONBOARDING_STEPS.length - 1;
  const next = () => {
    if (isLast) {
      onDone();
      onNav('write');
    } else {
      setStep(step + 1);
    }
  };
  const prev = () => setStep(Math.max(0, step - 1));
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape')        { e.preventDefault(); onSkip(); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft')  { e.preventDefault(); prev(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [step]);

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:400,
      display:'flex', alignItems:'center', justifyContent:'center', padding:20,
    }}>
      <div style={{
        background:'var(--paper)', border:'1px solid var(--rule-soft)',
        maxWidth:480, width:'100%', padding:'48px 40px 32px',
        boxShadow:'0 20px 60px rgba(0,0,0,0.25)', position:'relative',
      }}>
        <button onClick={onSkip} style={{
          position:'absolute', top:14, right:16, background:'none', border:'none',
          color:'var(--ink-mute)', cursor:'pointer', fontSize:11, fontFamily:'var(--f-mono)',
          letterSpacing:'0.1em',
        }}>SKIP →</button>

        <div className="eyebrow" style={{marginBottom:14}}>{s.eyebrow}</div>
        <h2 style={{
          fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:38,
          letterSpacing:'-0.025em', lineHeight:1.1, margin:'0 0 16px', color:'var(--ink)',
        }}>{s.title}</h2>
        <p style={{
          fontFamily:'var(--f-kr-serif)', fontSize:15.5, lineHeight:1.85,
          color:'var(--ink-soft)', whiteSpace:'pre-line', margin:'0 0 36px',
        }}>{s.body}</p>

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:12}}>
          {/* dots */}
          <div style={{display:'flex', gap:8}}>
            {ONBOARDING_STEPS.map((_, i) => (
              <span key={i} style={{
                width: i === step ? 18 : 6, height:6, borderRadius:3,
                background: i === step ? 'var(--ink)' : 'var(--paper-3)',
                transition:'width 0.2s, background 0.2s',
              }}/>
            ))}
          </div>
          <div style={{display:'flex', gap:8}}>
            {step > 0 && <button className="btn sm ghost" onClick={prev}>← 이전</button>}
            <button className="btn sm solid" onClick={next}>{s.cta}</button>
          </div>
        </div>

        <div className="meta" style={{fontSize:9.5, marginTop:18, textAlign:'center', color:'var(--ink-faint)'}}>
          ← / → 키로 이동 · Esc로 건너뛰기
        </div>
      </div>
    </div>
  );
};

const DetailScreen = ({post, onNav, posts, onToggleLike, onToggleBookmark, user, onEditPost, onDeletePost, blocks, follows, onToggleFollow, onReport, onBlockAuthor}) => {
  const toast = useToast();
  const p = post || posts[0];
  const postIndex = posts.findIndex(x => x.id === p.id);
  const isMine = user && (p?.handle === user.handle || p?.author === user.nickname);
  const isBlocked = blocks?.has(p.handle);

  const [reportTarget, setReportTarget] = useState(null); // {type, id, handle, label}
  const [moreOpen, setMoreOpen] = useState(false);

  const handleEdit = () => onEditPost(p);
  const handleDelete = () => {
    if (!window.confirm('이 글을 삭제할까요? 댓글도 함께 사라지고 되돌릴 수 없습니다.')) return;
    onDeletePost(p.id);
    toast('글이 삭제되었습니다.');
    onNav('feed');
  };

  const openReportPost = () => {
    setMoreOpen(false);
    setReportTarget({ type:'post', id:p.id, handle:p.handle, label:`${p.author}님의 "${p.title}"` });
  };
  const handleBlockAuthor = () => {
    setMoreOpen(false);
    if (!isBlocked && !window.confirm(`${p.author}님을 차단하시겠어요? 이 작가의 글과 댓글이 모두 숨겨집니다.`)) return;
    onBlockAuthor(p.handle);
    if (!isBlocked) onNav('feed');
  };
  const openReportComment = (c) => {
    setReportTarget({ type:'comment', id:c.id, handle:p.handle, label:`${c.n}님의 댓글` });
  };

  const [liked,     setLiked]     = useState(p.liked      || false);
  const [bookmarked,setBookmarked]= useState(p.bookmarked  || false);
  const followed = follows?.has(p.handle) || false;
  const [likeCount, setLikeCount] = useState(p.likes);
  const [bmCount,   setBmCount]   = useState(p.bookmarks);

  const [reactions, setReactions] = useState([
    {e:'♥', n:42, reacted:false},
    {e:'✨', n:18, reacted:false},
    {e:'🌧', n:12, reacted:false},
    {e:'🕯', n:8,  reacted:false},
    {e:'☕', n:5,  reacted:false},
  ]);

  const [commentText, setCommentText] = useState('');
  const [comments, setComments] = useState(() => {
    const all = _readJSON('wh_comments', {});
    return all[p.id] || DEFAULT_COMMENTS;
  });

  /* Persist comments per-post */
  useEffect(() => {
    try {
      const all = _readJSON('wh_comments', {});
      all[p.id] = comments;
      localStorage.setItem('wh_comments', JSON.stringify(all));
    } catch {}
  }, [comments, p.id]);

  const commentRef = useRef(null);

  const handleLike = () => {
    setLiked(l => !l);
    setLikeCount(c => liked ? c - 1 : c + 1);
    onToggleLike(p.id);
  };

  const handleBookmark = () => {
    setBookmarked(b => !b);
    setBmCount(c => bookmarked ? c - 1 : c + 1);
    onToggleBookmark(p.id);
  };

  const handleReaction = (idx) => {
    setReactions(rs => rs.map((r, i) => i === idx
      ? {...r, reacted: !r.reacted, n: r.reacted ? r.n - 1 : r.n + 1}
      : r
    ));
  };

  const handleComment = () => {

const STREAK_PERIODS = {
  '30일': { count: 30, labels: ['03·24','03·29','04·03','04·08','04·13','04·18','오늘'] },
  '90일': { count: 90, labels: ['01·25','02·08','02·22','03·07','03·21','04·04','오늘'] },
  '1년':  { count: 365, labels: ['25·04','25·07','25·10','26·01','26·02','26·03','오늘'] },
};

const makeStreak = (count) => Array.from({length: count}, (_, i) => {
  if (i === count - 1) return 'today';
  const r = Math.sin(i * 3.7) + Math.cos(i * 1.3);
  return r > -0.4 ? 'on' : 'off';
});

const FOLLOWER_USERS = [
  {name:'이서연', handle:'seoyeon', bio:'시와 소설 사이 어딘가.'},
  {name:'박준호', handle:'junho', bio:'매일 새벽 네 시에 씁니다.'},
  {name:'최하은', handle:'haeun', bio:'감정을 단어로 옮기는 연습 중.'},
  {name:'강도윤', handle:'doyun', bio:'짧고 정확하게.'},
];

const ProfileScreen = ({onNav, posts, user, viewUser, onLogout, onUpdateUser, onEditPost, onDeletePost, blocks, follows, onToggleFollow, onBlockAuthor}) => {
  const toast = useToast();
  const isOwnProfile = !viewUser;
  const followed = viewUser ? follows?.has(viewUser.handle) : false;

  const [profileTab, setProfileTab] = useState('글');
  const [streakPeriod, setStreakPeriod] = useState('30일');
  const [editing, setEditing] = useState(false);
  const [editNick, setEditNick] = useState(user?.nickname || '');
  const [editBio,  setEditBio]  = useState(user?.bio || '');
  const [editNickStatus, setEditNickStatus] = useState('ok');

  useEffect(() => { setProfileTab('글'); }, [viewUser?.handle]);

  const editHandlePreview = sanitizeHandle(editNick);

  useEffect(() => {
    if (!editing) return;
    if (!editHandlePreview || editHandlePreview.length < 2) { setEditNickStatus('idle'); return; }
    if (editHandlePreview === user?.handle) { setEditNickStatus('ok'); return; }
    setEditNickStatus('checking');
    let cancelled = false;
    const id = setTimeout(async () => {
      const r = await checkHandleAvailable(editHandlePreview, user?.handle);
      if (!cancelled) setEditNickStatus(r);
    }, 350);
    return () => { cancelled = true; clearTimeout(id); };
  }, [editHandlePreview, editing, user?.handle]);
  const name    = viewUser ? viewUser.author  : (user?.nickname || '김민지');
  const handle  = viewUser ? viewUser.handle  : (user?.handle || sanitizeHandle(user?.nickname || 'user') || 'user');
  const bio     = viewUser ? (viewUser.bio || '소개가 없습니다.') : (user?.bio || '매일 한 줄, 주로 저녁에. 조용한 것들에 대해 씁니다.');
  const initial = viewUser ? viewUser.initial : name[0];

  const openEdit = () => {
    setEditNick(user?.nickname || '');
    setEditBio(user?.bio || '');
    setEditing(true);
  };

  const saveEdit = () => {
    const nn = editNick.trim();
    if (!nn)              { toast('닉네임을 입력해주세요.', 'error'); return; }
    if (nn.length < 2)    { toast('닉네임은 2자 이상이어야 합니다.', 'error'); return; }
    if (nn.length > 20)   { toast('닉네임은 20자 이하여야 합니다.', 'error'); return; }
    if (editBio.length > 80) { toast('소개는 80자 이하여야 합니다.', 'error'); return; }
    if (editNickStatus === 'taken')    { toast('이미 사용 중인 닉네임입니다.', 'error'); return; }
    if (editNickStatus === 'checking') { toast('닉네임 확인이 끝나고 다시 시도해주세요.', 'error'); return; }
    const newHandle = sanitizeHandle(nn) || 'user';
    onUpdateUser({ nickname: nn, handle: newHandle, bio: editBio.trim() });
    setEditing(false);
    toast('프로필이 수정되었습니다 ✓');
  };

  const saveEditRef = useRef(saveEdit);
  saveEditRef.current = saveEdit;
  useEffect(() => {
    if (!editing) return;
    const onKey = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); setEditing(false); }
      else if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); saveEditRef.current(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [editing]);

  const { count: streakCount, labels: streakLabels } = STREAK_PERIODS[streakPeriod];
  const streakData = makeStreak(streakCount);

  const myPosts      = posts.filter(p => p.handle === handle || p.author === name);
  const displayPosts = myPosts.length ? myPosts : (isOwnProfile ? posts.slice(0, 4) : []);
  const savedPosts   = posts.filter(p => p.bookmarked);
  const likedPosts   = posts.filter(p => p.liked);

  const handleShare = () => {
    const url = `https://writehabit.kr/@${handle}`;
    if (navigator.clipboard) navigator.clipboard.writeText(url);
    toast(`프로필 링크가 복사되었습니다 · @${handle}`);
  };

  const handleCardEdit = (e, p) => {
    e.stopPropagation();
    onEditPost(p);
  };
  const handleCardDelete = (e, p) => {
    e.stopPropagation();
    if (!window.confirm(`"${p.title}" 을(를) 삭제할까요?`)) return;
    onDeletePost(p.id);
    toast('글이 삭제되었습니다.');
  };

  const renderPosts = (list, opts = {}) => {
    const { mine = false } = opts;
    if (!list.length) return (
      <div style={{padding:'48px 0', textAlign:'center', color:'var(--ink-mute)', fontFamily:'var(--f-mono)', fontSize:12}}>
        아직 글이 없습니다.
      </div>
    );
    return (
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:0}}>
        {list.slice(0,8).map((p, i) => (
          <article key={p.id} style={{padding:24, borderRight:i%2===0?'1px solid var(--rule-ghost)':'none', borderBottom:'1px solid var(--rule-ghost)', cursor:'pointer', position:'relative'}}
            onClick={() => onNav('detail', p)}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:10}}>
              <span className="meta" style={{fontSize:10.5}}>KW · {['이별','청춘','새벽','후회'][i%4]} · 0{340+i}{p.edited && ' · 수정됨'}</span>
              <span className="meta" style={{fontSize:10.5}}>{['04·23','04·21','04·16','04·15'][i%4]}</span>
            </div>
            <h3 style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:19, letterSpacing:'-0.02em', lineHeight:1.3, margin:'0 0 10px', color:'var(--ink)'}}>{p.title}</h3>

                    <button className="btn sm solid" onClick={() => onNav('write')}>오늘의 글 쓰기 <span className="arr">→</span></button>

                )
                : (
                  <div style={{padding:'48px 0', textAlign:'center', color:'var(--ink-mute)', fontFamily:'var(--f-mono)', fontSize:12}}>
                    아직 쓴 글이 없습니다.
                  </div>
                ),
    '저장':  savedPosts.length ? renderPosts(savedPosts) : renderPosts(posts.slice(1,5)),
    '좋아요': likedPosts.length ? renderPosts(likedPosts) : renderPosts(posts.slice(2,6)),
    '팔로잉': follows?.size
              ? renderUserList([...follows].map(h => {
                  const fromPost = posts.find(p => p.handle === h);
                  const known = FOLLOWER_USERS.find(u => u.handle === h);
                  if (fromPost) return { name: fromPost.author, handle: h, bio: known?.bio || '글로 만난 작가입니다.' };
                  if (known)    return known;
                  return { name: `@${h}`, handle: h, bio: '' };

              ),
    '팔로워': renderUserList([...FOLLOWER_USERS].reverse()),
    '차단':  blocks?.size
              ? (
                <div>
                  {[...blocks].map(h => {

                      <div key={h} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 0', borderBottom:'1px solid var(--rule-ghost)'}}>
                        <div style={{display:'flex', gap:14, alignItems:'center'}}>
                          <div className="avatar" style={{width:36, height:36, fontSize:14}}>{display.name[0]}</div>
                          <div>
                            <div style={{fontFamily:'var(--f-kr)', fontWeight:600, fontSize:14, color:'var(--ink)'}}>{display.name}</div>
                            <div className="meta" style={{fontSize:10.5, marginTop:2}}>@{h}</div>
                          </div>

                        <button className="btn sm" onClick={() => onBlockAuthor(h)}>차단 해제</button>

                  차단한 작가가 없습니다.
                </div>
              ),
  };

  return (

            <div>
              <div className="eyebrow" style={{marginBottom:8}}>WRITER · SINCE 2024·11</div>
              <h1 style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:44, letterSpacing:'-0.02em', lineHeight:1, margin:0, color:'var(--ink)'}}>{name}</h1>
              <div style={{marginTop:8, display:'flex', gap:12, alignItems:'center', color:'var(--ink-mute)', fontSize:13}}>
                <span className="meta">@{handle}</span>
                <span style={{opacity:0.4}}>/</span>
                <span>{bio}</span>
              </div>
            </div>
          </div>
          <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
            <button className="btn sm ghost" onClick={handleShare}>공유</button>

                <button className="btn sm" onClick={openEdit}>프로필 수정</button>
                <button className="btn sm" onClick={onLogout}>로그아웃</button>
                <button className="btn sm solid" onClick={() => onNav('write')}>새 글 쓰기 <span className="arr">→</span></button>
              </>
            ) : (
              <button className={`btn sm${followed ? ' ghost' : ' solid'}`} onClick={() => onToggleFollow(viewUser.handle)}>
                {followed ? '팔로잉 ✓' : '팔로우'}
              </button>
            )}
          </div>
        </section>

        {isOwnProfile && editing && (
          <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.35)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}
            onClick={() => setEditing(false)}>
            <div style={{background:'var(--card)', border:'1px solid var(--rule-soft)', borderRadius:4, padding:32, maxWidth:440, width:'100%', boxShadow:'0 16px 48px rgba(0,0,0,0.12)'}}
              onClick={e => e.stopPropagation()}>
              <div className="eyebrow" style={{marginBottom:8}}>EDIT PROFILE · 프로필 수정</div>
              <h3 style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:24, letterSpacing:'-0.02em', margin:'0 0 20px', color:'var(--ink)'}}>

              <div style={{marginBottom:18}}>
                <div className="label" style={{fontSize:10, marginBottom:6}}>01 · 닉네임</div>

              </div>

              <div style={{marginBottom:24}}>
                <div className="label" style={{fontSize:10, marginBottom:6}}>02 · 한 줄 소개</div>

                    background:'transparent', fontFamily:'var(--f-kr)', fontSize:15,

                  }}
                />
                <div className="meta" style={{fontSize:10, marginTop:4, textAlign:'right'}}>{editBio.length} / 80</div>
              </div>

              <div style={{display:'flex', gap:10, justifyContent:'space-between', alignItems:'center'}}>
                <span className="meta" style={{fontSize:10}}>⌘+Enter · 저장 · Esc · 취소</span>
                <span style={{display:'flex', gap:10}}>
                  <button className="btn ghost" onClick={() => setEditing(false)}>취소</button>
                  <button className="btn solid" onClick={saveEdit} title="⌘+Enter">저장 <span className="arr">→</span></button>
                </span>
              </div>
            </div>
          </div>
        )}

        {/* Stats */}
        <section style={{display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:40, padding:'28px 0', borderBottom:'1px solid var(--rule-soft)'}}>
          {[['누적 글','184','편'],['총 분량','62,340','자'],['받은 ♥','3,842',''],['팔로워','2,304',''],['현재 스트릭','47','일']].map(([k,v,s]) => (
            <div key={k}>
              <div className="label" style={{fontSize:10, marginBottom:8}}>{k}</div>
              <div style={{fontFamily:'var(--f-latin)', fontWeight:700, fontSize:34, letterSpacing:'-0.04em', color:'var(--ink)', fontVariantNumeric:'tabular-nums', lineHeight:1}}>
                {v} <span style={{fontSize:13, color:'var(--ink-mute)', fontFamily:'var(--f-kr)', fontWeight:500, letterSpacing:0, marginLeft:4}}>{s}</span>
              </div>
            </div>
          ))}
        </section>

        {/* Streak — own profile only */}
        {isOwnProfile && (
          <section style={{padding:'28px 0', borderBottom:'1px solid var(--rule-soft)'}}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:16, alignItems:'baseline'}}>
              <div>
                <div className="eyebrow">연속 작성 · WRITING STREAK</div>
                <div style={{fontFamily:'var(--f-kr-serif)', fontSize:22, fontWeight:700, marginTop:4, color:'var(--ink)'}}>
                  47일 연속 기록 중 <span style={{color:'var(--accent)', fontFamily:'var(--f-latin)', fontSize:18, marginLeft:8}}>● 오늘 완료</span>
                </div>
              </div>
              <div style={{display:'flex', gap:10}}>
                {['30일','90일','1년'].map(p => (
                  <button key={p} className={`chip${streakPeriod===p?' active':''}`} onClick={() => setStreakPeriod(p)}>{p}</button>
                ))}
              </div>
            </div>
            <div className="streak" style={{overflowX:'auto'}}>
              {streakData.map((s, i) => (
                <div key={i} className={`b ${s}`} style={{height: s==='off'?12 : s==='on'?30+((i*7)%40) : 74, flexShrink:0}} />
              ))}
            </div>
            <div style={{display:'flex', justifyContent:'space-between', marginTop:8, fontFamily:'var(--f-mono)', fontSize:10, color:'var(--ink-mute)'}}>
              {streakLabels.map(l => <span key={l}>{l}</span>)}
            </div>
          </section>
        )}

        {/* Posts tabs */}
        <section style={{padding:'28px 0'}}>
          <div style={{display:'flex', gap:20, marginBottom:20, borderBottom:'1px solid var(--rule-ghost)'}}>
            {(isOwnProfile
              ? [['글',myPosts.length],['저장',56],['좋아요',412],['팔로잉', follows?.size || 0],['팔로워',2304],['차단', blocks?.size || 0]]
              : [['글', posts.filter(p => p.handle === handle).length]]
            ).map(([k,n]) => (
              <button key={k} onClick={() => setProfileTab(k)} style={{
                background:'none', border:'none', padding:'10px 2px',
                borderBottom: profileTab===k ? '1.5px solid var(--ink)' : '1.5px solid transparent',
                color: profileTab===k ? 'var(--ink)' : 'var(--ink-mute)',
                fontFamily:'var(--f-kr)', fontWeight: profileTab===k ? 600 : 500, fontSize:13,
                letterSpacing:'-0.005em', cursor:'pointer'
              }}>
                {k} <span style={{fontFamily:'var(--f-latin)', color:'var(--ink-faint)', marginLeft:4}}>{n}</span>
              </button>
            ))}
          </div>
          {tabContent[profileTab]}
        </section>
      </div>
    </div>
  );
};

const ArchiveScreen = ({onNav, dark, onToggleDark, user, onLogout}) => {
  const toast = useToast();
  const [showMore, setShowMore] = useState(false);
  const [filterYear, setFilterYear] = useState('2026');
  const [filterMonth, setFilterMonth] = useState('04');
  const [yearOpen, setYearOpen] = useState(false);
  const [monthOpen, setMonthOpen] = useState(false);

  const today = 30;
  const grid = Array.from({length:98}, (_, i) => {
    if (i === today) return 'today';
    if (i > today) return 'future';
    const r = Math.sin(i*2.1) + Math.cos(i*0.7);
    return r > 0.3 ? 'on' : r > -0.5 ? 'on-light' : 'none';
  });

  const visibleKeywords = showMore ? KEYWORDS_ARCHIVE : KEYWORDS_ARCHIVE.slice(0, 10);

  const handleRead = (k) => {
    toast(`${k.word} · ${k.eng} — 글 목록으로 이동합니다`);
    onNav('feed');
  };

  const handleTopKw = (word) => {
    toast(`${word} — 글 목록으로 이동합니다`);
    onNav('feed');
  };

  const DropFilter = ({label, value, open, onToggle, options, onSelect}) => (
    <div style={{position:'relative'}}>
      <div className="tsel" style={{padding:'8px 12px', cursor:'pointer'}} onClick={onToggle}>
        {label} · {value} ▾
      </div>
      {open && (
        <div style={{
          position:'absolute', top:'calc(100% + 4px)', right:0, zIndex:20,
          background:'var(--paper)', border:'1px solid var(--rule)', minWidth:100,
          boxShadow:'0 4px 16px rgba(0,0,0,0.08)',
        }}>
          {options.map(o => (
            <div key={o} onClick={() => { onSelect(o); onToggle(); }} style={{
              padding:'9px 14px', cursor:'pointer', fontFamily:'var(--f-mono)', fontSize:11,
              color: o === value ? 'var(--accent)' : 'var(--ink)',
              background: o === value ? 'var(--paper-2)' : 'transparent',
            }}
              onMouseEnter={e => e.currentTarget.style.background='var(--paper-2)'}
              onMouseLeave={e => e.currentTarget.style.background= o===value ? 'var(--paper-2)' : 'transparent'}>
              {o}
            </div>
          ))}
        </div>
      )}
    </div>
  );

  return (
    <div onClick={() => { setYearOpen(false); setMonthOpen(false); }}>
      <div className="wrap" style={{paddingTop:36}}>
        <section style={{display:'grid', gridTemplateColumns:'1fr auto', gap:40, alignItems:'end', paddingBottom:24, borderBottom:'1px solid var(--rule)'}}>
          <div>
            <div className="eyebrow" style={{marginBottom:10}}>ARCHIVE · 342 DAYS · 428,932 WRITINGS</div>
            <h1 style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:56, letterSpacing:'-0.025em', lineHeight:1, margin:0, color:'var(--ink)'}}>키워드 아카이브</h1>
            <p style={{fontSize:14, color:'var(--ink-mute)', marginTop:14, maxWidth:'48ch', lineHeight:1.65}}>2025년 5월 17일부터 매일 하나씩, 342개의 키워드가 쌓였습니다. 한 글자, 한 단어, 하나의 감정에 대한 기록.</p>
          </div>
          <div style={{display:'flex', gap:8}} onClick={e => e.stopPropagation()}>
            <DropFilter label="연도" value={filterYear} open={yearOpen}
              onToggle={() => { setYearOpen(v=>!v); setMonthOpen(false); }}
              options={['2025','2026']} onSelect={setFilterYear} />
            <DropFilter label="월" value={filterMonth} open={monthOpen}
              onToggle={() => { setMonthOpen(v=>!v); setYearOpen(false); }}
              options={['01','02','03','04','05','06','07','08','09','10','11','12']} onSelect={setFilterMonth} />
          </div>
        </section>

        <section style={{display:'grid', gridTemplateColumns:'420px 1fr', gap:56, paddingTop:32}}>
          <div>
            <div className="col-h">
              <h2>지난 98일</h2>
              <span className="meta">2026·01·15 → 04·23</span>
            </div>
            <div className="cal">
              {grid.map((s, i) => (
                <div key={i}
                  className={`d${s==='today'?' today':s==='future'?'':s==='on'?' on':s==='on-light'?' on-light':''}`}
                  style={{...(s==='future'?{opacity:0.25}:{}), ...(s!=='future'&&s!=='today'?{cursor:'pointer'}:{})}}
                  onClick={() => s !== 'future' && s !== 'today' && toast(`이 날의 키워드 글 보기`)}>
                  {s==='today'?'●':''}
                </div>
              ))}
            </div>
            <div style={{display:'flex', gap:14, marginTop:16, fontFamily:'var(--f-mono)', fontSize:10.5, color:'var(--ink-mute)', alignItems:'center'}}>
              {[['var(--accent)','오늘'],['var(--ink)','작성함'],['var(--paper-3)','읽기만'],['transparent','미작성']].map(([bg,label], i) => (
                <span key={label} style={{display:'inline-flex', alignItems:'center', gap:6}}>
                  <span style={{width:10, height:10, background:bg, border:i===3?'1px solid var(--rule-ghost)':'none', display:'block'}}/>
                  {label}
                </span>
              ))}
            </div>

            <div style={{marginTop:32}}>
              <div className="col-h"><h2>가장 많이 쓴 키워드</h2></div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
                {[['YOUTH','청춘',12],['MEMORY','기억',9],['DAWN','새벽',7],['SILENCE','침묵',6]].map(([e,k,n], i) => (
                  <div key={i} onClick={() => handleTopKw(k)} style={{border:'1px solid var(--rule-ghost)', padding:16, display:'flex', justifyContent:'space-between', alignItems:'center', cursor:'pointer'}}>
                    <div>
                      <div className="meta" style={{fontSize:9.5}}>{e}</div>
                      <div style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:22, letterSpacing:'-0.02em'}}>{k}</div>
                    </div>
                    <div style={{fontFamily:'var(--f-latin)', fontWeight:700, fontSize:22, color:'var(--accent)', fontVariantNumeric:'tabular-nums'}}>
                      {n}<span style={{fontSize:11, color:'var(--ink-mute)', fontWeight:500, marginLeft:2}}>회</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div>
            <div className="col-h">
              <h2>최근 키워드</h2>
              <span className="meta">DATE · WORD · WRITINGS</span>
            </div>
            {visibleKeywords.map((k, i) => (
              <div className="kw-row" key={i}>
                <span className="kdate">2026·{k.date}</span>
                <div>
                  <div className="kword">
                    <span className="kor-serif">{k.word}</span>
                    <span style={{marginLeft:14, color:'var(--ink-faint)', fontFamily:'var(--f-serif)', fontSize:14, letterSpacing:'0.08em'}}>{k.eng}</span>
                  </div>
                  <div className="meta" style={{fontSize:10.5, marginTop:2}}>
                    NO. {String(341-i).padStart(4,'0')} · {i===0 ? '작성함 ✓' : i%3!==0 ? '작성함 ✓' : '미작성 —'}
                  </div>
                </div>
                <div className="kcount">{k.count.toLocaleString()}<small>글</small></div>
                <div style={{textAlign:'right'}}>
                  <button className="btn sm ghost" onClick={() => handleRead(k)}>읽기 <span className="arr">→</span></button>
                </div>
              </div>
            ))}
            {!showMore && (
              <div style={{textAlign:'center', padding:'28px 0 8px'}}>
                <button className="btn ghost" onClick={() => setShowMore(true)}>
                  더 오래된 키워드 보기 <span className="arr">↓</span>
                </button>
              </div>
            )}
          </div>
        </section>
      </div>
    </div>
  );
};
