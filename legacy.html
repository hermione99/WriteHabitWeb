/* Reserved/taken handles — in production this would hit /api/check-handle */
const RESERVED_HANDLES = new Set([
  'admin','help','support','about','login','signup','write','feed','archive','profile',
  'system','official','writehabit','editor','test','user',
]);

const sanitizeHandle = (s) =>
  (s || '').toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9가-힣ㄱ-ㅎㅏ-ㅣ]/g,'');

/* Collect all handles in use across the app's known data + persisted state */
const collectTakenHandles = () => {
  const set = new Set(RESERVED_HANDLES);
  try {
    INITIAL_POSTS.forEach(p => p.handle && set.add(p.handle));
    EXTRA_POSTS  .forEach(p => p.handle && set.add(p.handle));
    FOLLOWER_USERS.forEach(u => u.handle && set.add(u.handle));
    const persisted = JSON.parse(localStorage.getItem('wh_posts') || '[]');
    if (Array.isArray(persisted)) persisted.forEach(p => p.handle && set.add(p.handle));
    set.add('minji'); // demo account
  } catch {}
  return set;
};

/* Async check: simulates a server roundtrip */
const checkHandleAvailable = (handle, currentHandle) => new Promise(resolve => {
  setTimeout(() => {
    if (currentHandle && handle === currentHandle) { resolve('ok'); return; }
    const taken = collectTakenHandles();
    resolve(taken.has(handle) ? 'taken' : 'ok');
  }, 380);
});

/* Defined outside LoginScreen so React never remounts it on re-render */
const LoginField = ({id, label, type='text', value, onChange, placeholder, err, autoComplete, onClearError}) => (
  <div style={{marginBottom: err ? 8 : 20}}>
    <div className="label" style={{fontSize:10, marginBottom:6}}>{label}</div>
    <input
      className={`field${err ? ' error' : ''}`}
      type={type} value={value} onChange={onChange}
      placeholder={placeholder}
      autoComplete={autoComplete || id}
      onFocus={onClearError}
    />
    {err && <span className="field-err">{err}</span>}
  </div>
);

const LoginScreen = ({onLogin}) => {
  const toast = useToast();

  /* mode: 'login' | 'signup' | 'reset' */
  const [mode, setMode]           = useState('login');

  /* fields */
  const [nickname, setNickname]   = useState('');
  const [email, setEmail]         = useState('');
  const [pass, setPass]           = useState('');
  const [passConfirm, setPassCfm] = useState('');
  const [resetEmail, setResetEmail] = useState('');
  const [resetSent, setResetSent] = useState(false);

  /* checkbox */
  const [remember, setRemember]   = useState(true);

  /* state */
  const [loading, setLoading]     = useState(false);
  const [errors, setErrors]       = useState({});

  /* clear errors on mode switch */
  const switchMode = (m) => { setMode(m); setErrors({}); setPass(''); setPassCfm(''); };

  /* nickname → URL handle (한글 보존, 공백·특수문자만 제거) */
  const handlePreview = sanitizeHandle(nickname);

  /* nickname uniqueness check (debounced) */
  const [nickStatus, setNickStatus] = useState('idle'); // 'idle'|'checking'|'ok'|'taken'
  useEffect(() => {
    if (mode !== 'signup') return;
    if (!handlePreview || handlePreview.length < 2) { setNickStatus('idle'); return; }
    setNickStatus('checking');
    let cancelled = false;
    const id = setTimeout(async () => {
      const r = await checkHandleAvailable(handlePreview);
      if (!cancelled) setNickStatus(r);
    }, 350);
    return () => { cancelled = true; clearTimeout(id); };
  }, [handlePreview, mode]);

  /* ── validation ── */
  const validate = () => {
    const e = {};
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (mode === 'signup') {
      const n = nickname.trim();
      if (!n)                        e.nickname = '닉네임을 입력해주세요.';
      else if (n.length < 2)         e.nickname = '닉네임은 2자 이상이어야 합니다.';
      else if (n.length > 20)        e.nickname = '닉네임은 20자 이하여야 합니다.';
      else if (!handlePreview)       e.nickname = '한글·영문·숫자를 포함해주세요.';
      else if (nickStatus === 'taken')   e.nickname = '이미 사용 중인 닉네임입니다.';
      else if (nickStatus === 'checking') e.nickname = '닉네임 확인 중입니다…';
    }

    if (!email.trim())               e.email = '이메일을 입력해주세요.';
    else if (!emailRe.test(email))   e.email = '올바른 이메일 형식이 아닙니다.';

    if (!pass)                       e.pass = '비밀번호를 입력해주세요.';
    else if (pass.length < 6)        e.pass = '비밀번호는 6자 이상이어야 합니다.';

    if (mode === 'signup') {
      if (!passConfirm)              e.passConfirm = '비밀번호를 한 번 더 입력해주세요.';
      else if (pass !== passConfirm) e.passConfirm = '비밀번호가 일치하지 않습니다.';
    }
    return e;
  };

  /* ── submit ── */
  const handleSubmit = (e) => {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }

    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (mode === 'login') {
        /* demo auth: only the demo credentials work; anything else errors */
        if (email === DEMO_EMAIL && pass === DEMO_PASSWORD) {
          if (remember) localStorage.setItem('wh_logged_in', '1');
          onLogin({ nickname: '김민지', email });
        } else {
          setErrors({ form: '이메일 또는 비밀번호가 올바르지 않습니다.' });
        }
      } else {
        /* signup: always succeeds in demo */
        if (remember) localStorage.setItem('wh_logged_in', '1');
        const nn = nickname.trim() || email.split('@')[0];
        onLogin({ nickname: nn, handle: handlePreview || nn.toLowerCase(), email });
      }
    }, 900);
  };

  /* ── reset password submit ── */
  const handleReset = (e) => {
    e.preventDefault();
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!resetEmail || !emailRe.test(resetEmail)) {
      setErrors({ resetEmail: '올바른 이메일을 입력해주세요.' });
      return;
    }
    setLoading(true);
    setTimeout(() => { setLoading(false); setResetSent(true); }, 800);
  };

  /* ── social stub ── */
  const handleSocial = (provider) => {
    toast(`${provider} 로그인은 준비 중입니다.`, 'info');
  };

  const clearErr = (id) => setErrors(prev => ({...prev, [id]: undefined, form: undefined}));

  return (
    <div className="login-grid">
      {/* LEFT — keyword panel */}
      <aside className="login-left">
        <Logo />
        <div>
          <div className="eyebrow" style={{marginBottom:14}}>오늘의 키워드 · {TODAY_KW.dateStr} · NO. {TODAY_KW.no}</div>
          <div style={{fontFamily:'var(--f-kw)', fontWeight:700, fontSize:96, letterSpacing:'-0.03em', lineHeight:0.95, color:'var(--ink)'}}>{TODAY_KW.word}</div>
          <div style={{fontFamily:'var(--f-serif)', fontSize:28, color:'var(--ink-faint)', letterSpacing:'0.05em', marginTop:4}}>{TODAY_KW.eng}</div>
          <p style={{fontFamily:'var(--f-kr-serif)', fontSize:17, lineHeight:1.8, color:'var(--ink-soft)', marginTop:36, maxWidth:'36ch'}}>
            하루에 한 번,<br/>하나의 키워드에<br/>당신의 문장을 남겨보세요.
          </p>
          <div style={{display:'flex', gap:40, marginTop:56, paddingTop:24, borderTop:'1px solid var(--rule-soft)'}}>
            {[[TODAY_KW.no.replace(/^0+/,''),'일째'],['28,419','명의 작가'],['428K','편의 글']].map(([n,l]) => (
              <div key={l}>
                <div style={{fontFamily:'var(--f-latin)', fontWeight:700, fontSize:24, letterSpacing:'-0.03em', color:'var(--ink)'}}>{n}</div>
                <div className="meta" style={{fontSize:10.5, marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="meta" style={{fontSize:10.5}}>© 2026 WriteHabit · v1.0.2</div>
      </aside>

      {/* RIGHT — form */}
      <main className="login-right">
        <div style={{maxWidth:380}}>

          {/* ── RESET PASSWORD MODE ── */}
          {mode === 'reset' ? (<>
            <button onClick={() => { setMode('login'); setErrors({}); setResetSent(false); setResetEmail(''); }}
              style={{background:'none', border:'none', cursor:'pointer', fontFamily:'var(--f-mono)', fontSize:11, color:'var(--ink-mute)', marginBottom:24, padding:0, display:'flex', alignItems:'center', gap:6}}>
              ← 로그인으로 돌아가기
            </button>
            <div className="eyebrow" style={{marginBottom:12}}>RESET · 비밀번호 찾기</div>
            <h2 style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:36, letterSpacing:'-0.025em', lineHeight:1.1, margin:'0 0 10px', color:'var(--ink)'}}>
              비밀번호를<br/>재설정합니다.
            </h2>
            <p style={{color:'var(--ink-mute)', fontSize:14, margin:'0 0 32px', lineHeight:1.65}}>
              가입 시 사용한 이메일을 입력하면<br/>재설정 링크를 보내드립니다.
            </p>

            {resetSent ? (
              <div className="reset-panel">
                <div style={{fontFamily:'var(--f-kr-serif)', fontSize:18, fontWeight:700, marginBottom:8, color:'var(--ink)'}}>이메일을 보냈습니다 ✓</div>
                <div style={{fontSize:13, color:'var(--ink-mute)', lineHeight:1.65}}>
                  <strong style={{color:'var(--ink)'}}>{resetEmail}</strong>으로<br/>
                  재설정 링크가 발송되었습니다.<br/>
                  메일함을 확인해주세요.
                </div>
              </div>
            ) : (
              <form onSubmit={handleReset}>
                <LoginField id="resetEmail" label="01 · EMAIL" type="email"
                  value={resetEmail} onChange={e=>setResetEmail(e.target.value)}
                  placeholder="가입 시 사용한 이메일" err={errors.resetEmail}
                  onClearError={() => clearErr('resetEmail')} />
                <div style={{marginBottom:20}} />
                <button type="submit" className="btn solid" disabled={loading}
                  style={{width:'100%', justifyContent:'center', padding:'14px 20px', fontSize:13, opacity: loading ? 0.7 : 1}}>
                  {loading ? <span className="spinner"/> : <>링크 전송 <span className="arr">→</span></>}
                </button>
              </form>
            )}
          </>) : (<>

            {/* ── LOGIN / SIGNUP MODE ── */}
            <div className="eyebrow" style={{marginBottom:12}}>{mode==='signup' ? 'SIGNUP · 회원가입' : 'LOGIN · 로그인'}</div>
            <h2 style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:40, letterSpacing:'-0.025em', lineHeight:1.1, margin:'0 0 10px', color:'var(--ink)'}}>
              {mode==='signup' ? <>처음 오셨군요.<br/>반갑습니다.</> : <>다시 만나서<br/>반갑습니다.</>}
            </h2>
            <p style={{color:'var(--ink-mute)', fontSize:14, margin:'0 0 32px'}}>
              {mode==='signup' ? '지금 가입하고 오늘의 글을 써보세요.' : '어제의 당신이 남긴 글이 기다리고 있어요.'}
            </p>

            {/* global form error */}
            {errors.form && (
              <div style={{background:'rgba(192,57,43,0.08)', border:'1px solid rgba(192,57,43,0.3)', padding:'10px 14px', marginBottom:20, borderRadius:2}}>
                <span style={{fontFamily:'var(--f-kr)', fontSize:13, color:'#c0392b'}}>{errors.form}</span>
              </div>
            )}

            <form onSubmit={handleSubmit} noValidate>
              {mode==='signup' && (
                <>
                  <LoginField id="nickname" label="01 · 닉네임 (필명)"
                    value={nickname} onChange={e=>setNickname(e.target.value)}
                    placeholder="예) 달밤, moonchild, 새벽세시"
                    err={errors.nickname}
                    onClearError={() => clearErr('nickname')} />
                  <div style={{
                    margin:'-12px 0 18px', display:'flex', justifyContent:'space-between',
                    alignItems:'center', gap:8, fontSize:11, color:'var(--ink-mute)',
                    fontFamily:'var(--f-mono)',
                  }}>
                    <span>
                      {nickStatus === 'checking' && handlePreview ? '닉네임 확인 중…'
                       : nickStatus === 'taken'  ? <span style={{color:'#c0392b'}}>이미 사용 중인 닉네임입니다.</span>
                       : nickStatus === 'ok'     ? <span style={{color:'var(--accent)'}}>사용 가능한 닉네임입니다 ✓</span>
                       : '본명이 아니어도 좋아요. 글에 작가 이름으로 표시됩니다.'}
                    </span>
                    {handlePreview && (
                      <span style={{
                        whiteSpace:'nowrap',
                        color: nickStatus === 'taken' ? '#c0392b'
                             : nickStatus === 'ok'    ? 'var(--accent)'
                             : 'var(--ink-mute)',
                      }}>@{handlePreview}</span>
                    )}
                  </div>
                </>
              )}
              <LoginField id="email" label={mode==='signup' ? '02 · 이메일' : '01 · EMAIL'} type="email"
                value={email} onChange={e=>setEmail(e.target.value)}
                placeholder="your@email.com" err={errors.email}
                onClearError={() => clearErr('email')} />
              <LoginField id="pass" label={mode==='signup' ? '03 · 비밀번호' : '02 · PASSWORD'} type="password"
                value={pass} onChange={e=>setPass(e.target.value)}
                placeholder={mode==='signup' ? '6자 이상' : '비밀번호'} err={errors.pass}
                autoComplete={mode==='signup' ? 'new-password' : 'current-password'}
                onClearError={() => clearErr('pass')} />
              {mode==='signup' && (
                <LoginField id="passConfirm" label="04 · 비밀번호 확인" type="password"
                  value={passConfirm} onChange={e=>setPassCfm(e.target.value)}
                  placeholder="비밀번호 재입력" err={errors.passConfirm}
                  autoComplete="new-password"
                  onClearError={() => clearErr('passConfirm')} />
              )}

              {/* remember + forgot — login only */}
              {mode==='login' && (
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:28, fontSize:12}}>
                  <label style={{display:'inline-flex', alignItems:'center', gap:8, color:'var(--ink-soft)', cursor:'pointer', userSelect:'none'}}
                    onClick={() => setRemember(r=>!r)}>
                    <span className={`cb-box${remember?' checked':''}`}>{remember?'✓':''}</span>
                    로그인 상태 유지
                  </label>
                  <button type="button" onClick={() => setMode('reset')}
                    style={{background:'none', border:'none', cursor:'pointer', color:'var(--ink-mute)', textDecoration:'underline', textUnderlineOffset:3, fontSize:12}}>
                    비밀번호 찾기
                  </button>
                </div>
              )}
              {mode==='signup' && <div style={{marginBottom:28}}/>}

              <button type="submit" className="btn solid" disabled={loading}
                style={{width:'100%', justifyContent:'center', padding:'14px 20px', fontSize:13, opacity: loading ? 0.7 : 1}}>
                {loading
                  ? <><span className="spinner"/> &nbsp;{mode==='signup'?'가입 중…':'로그인 중…'}</>
                  : <>{mode==='signup'?'가입하기':'로그인'} <span className="arr">→</span></>
                }
              </button>

              {mode==='login' && (
                <p style={{marginTop:12, fontSize:11.5, color:'var(--ink-faint)', textAlign:'center', fontFamily:'var(--f-mono)'}}>
                  데모 계정: {DEMO_EMAIL} / {DEMO_PASSWORD}
                </p>
              )}
            </form>

            <div style={{display:'flex', alignItems:'center', gap:12, margin:'24px 0', color:'var(--ink-faint)', fontFamily:'var(--f-mono)', fontSize:10.5}}>
              <span style={{flex:1, height:1, background:'var(--rule-soft)'}}/>
              <span>OR</span>
              <span style={{flex:1, height:1, background:'var(--rule-soft)'}}/>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <button className="btn" style={{justifyContent:'center'}} onClick={() => handleSocial('Google')}>Google</button>
              <button className="btn" style={{justifyContent:'center'}} onClick={() => handleSocial('Apple')}>Apple</button>
            </div>
            <p style={{marginTop:28, fontSize:12.5, color:'var(--ink-mute)', textAlign:'center'}}>
              {mode==='signup' ? '이미 계정이 있으신가요? ' : '아직 계정이 없으신가요? '}
              <button onClick={() => switchMode(mode==='signup'?'login':'signup')}
                style={{background:'none', border:'none', color:'var(--ink)', fontWeight:600, textDecoration:'underline', textUnderlineOffset:3, cursor:'pointer', fontSize:12.5}}>
                {mode==='signup' ? '로그인' : '회원가입'}
              </button>
            </p>
          </>)}

        </div>
      </main>
    </div>
  );
};

          <Toggle on={prefs.notifSystem}  onClick={() => onUpdatePrefs({notifSystem: !prefs.notifSystem})}

          <div className="eyebrow" style={{marginBottom:8, color:'var(--accent)'}}>DANGER ZONE · 위험 영역</div>

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', paddingTop:24}}>

              정말 계정을 삭제할까요?
            </h3>
            <p style={{fontSize:13, color:'var(--ink-soft)', lineHeight:1.65, margin:'0 0 20px'}}>
              이 작업을 진행하면 다음 데이터가 즉시 삭제됩니다:<br/>
              · 작성한 모든 글과 댓글<br/>
              · 팔로우/팔로워 관계<br/>
              · 차단 목록과 알림<br/>
              · 프로필과 환경설정<br/>
              <strong style={{color:'var(--accent)'}}>되돌릴 수 없습니다.</strong>

            <div style={{marginBottom:20}}>
              <div className="label" style={{fontSize:10, marginBottom:6}}>확인을 위해 <strong style={{color:'var(--accent)'}}>삭제</strong>를 입력하세요</div>
              <input className="field" value={confirmText} onChange={e => setConfirmText(e.target.value)} placeholder="삭제" autoFocus />

            <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
              <button className="btn ghost" onClick={() => setConfirmDelete(false)}>취소</button>

                onClick={() => { onDeleteAccount(); setConfirmDelete(false); }}
                style={{background: confirmText==='삭제' ? 'var(--accent)' : 'var(--paper-3)', borderColor:'transparent', cursor: confirmText==='삭제'?'pointer':'not-allowed'}}>

};

/* ══════════════════════════════

const AdminScreen = ({onNav, dark, onToggleDark, user, onLogout}) => {
  const toast = useToast();
  const suggestRef = useRef(null);

  const [schedule, setSchedule] = useState(SCHEDULED);
  const [newDate, setNewDate]   = useState('');
  const [newWord, setNewWord]   = useState('');
  const [newEng, setNewEng]     = useState('');
  const [newPrompt, setNewPrompt] = useState('');
  const [newCat, setNewCat]     = useState('');
  const [editIdx, setEditIdx]   = useState(null);
  const [suggestions, setSuggestions] = useState([
    {w:'첫눈', by:'한지우', v:48},
    {w:'기차', by:'박서연', v:31},
    {w:'편지', by:'정윤',   v:24},
    {w:'엄마의 밥상', by:'김도현', v:18},
  ]);

  /* ── AI generated drafts (awaiting editor review) ── */
  const [aiDrafts, setAiDrafts]   = useState([]);
  const [aiLoading, setAiLoading] = useState(false);
  const aiRef = useRef(null);

  /* Words already used (archive + current schedule + pending drafts) */
  const usedWords = React.useMemo(() => {
    const set = new Set();
    KEYWORDS_ARCHIVE.forEach(k => set.add(k.word));
    schedule.forEach(r => r.word && set.add(r.word));
    aiDrafts.forEach(d => set.add(d.word));
    return set;
  }, [schedule, aiDrafts]);

  /* SIMULATED AI generation — picks N unused keywords from KEYWORD_POOL.
     Replace this body with a real LLM call (server-side) in production. */
  const generateAIKeywords = async (n = 7) => {
    await new Promise(r => setTimeout(r, 900)); // fake latency
    const candidates = KEYWORD_POOL.filter(k => !usedWords.has(k.word));
    // shuffle then take n
    const shuffled = candidates
      .map(k => [Math.random(), k])
      .sort((a, b) => a[0] - b[0])
      .map(([, k]) => k);
    const chosen = shuffled.slice(0, n);
    const today = new Date();
    const lastDate = schedule[schedule.length - 1]?.date || `${String(today.getMonth()+1).padStart(2,'0')}·${String(today.getDate()).padStart(2,'0')}`;
    const [lm, ld] = lastDate.split('·').map(Number);
    let cursor = new Date(today.getFullYear(), (lm||today.getMonth()+1) - 1, ld||today.getDate());
    return chosen.map((k, i) => {
      cursor = new Date(cursor.getTime() + 86400000);
      const d  = `${String(cursor.getMonth()+1).padStart(2,'0')}·${String(cursor.getDate()).padStart(2,'0')}`;
      const dy = ['일','월','화','수','목','금','토'][cursor.getDay()];
      return { ...k, date: d, day: dy, reason: `'${k.word}' — 풀에서 미사용 키워드로 추출됨` };
    });
  };

  const handleAIGenerate = async () => {
    if (aiLoading) return;
    setAiLoading(true);
    try {
      const drafts = await generateAIKeywords(7);
      setAiDrafts(drafts);
      toast(`AI가 7일치 키워드 초안을 생성했습니다. 검수해주세요.`);
      setTimeout(() => aiRef.current?.scrollIntoView({behavior:'smooth'}), 50);
    } finally { setAiLoading(false); }
  };

  const handleAIApprove = (idx) => {
    const d = aiDrafts[idx];
    setSchedule(s => {
      // try to fill an empty slot first
      const emptyIdx = s.findIndex(r => r.status === 'empty');
      const entry = { date: d.date, day: d.day, word: d.word, eng: d.eng, status: 'scheduled', by: 'AI · 운영팀', posts: null };
      if (emptyIdx >= 0) {
        return s.map((r, i) => i === emptyIdx ? { ...entry, date: r.date, day: r.day } : r);
      }
      return [...s, entry];
    });
    setAiDrafts(arr => arr.filter((_, i) => i !== idx));
    toast(`${d.word} · ${d.eng} — 승인되어 예약되었습니다.`);
  };

  const handleAIReject = (idx) => {
    const d = aiDrafts[idx];
    setAiDrafts(arr => arr.filter((_, i) => i !== idx));
    toast(`${d.word} — 반려되었습니다.`);
  };

  const handleAIRegenerate = async (idx) => {
    const candidates = KEYWORD_POOL.filter(k => !usedWords.has(k.word));
    if (!candidates.length) { toast('더 이상 사용할 수 있는 키워드가 없습니다.'); return; }
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    setAiDrafts(arr => arr.map((d, i) => i === idx ? { ...d, word: pick.word, eng: pick.eng, reason: `'${pick.word}' — 재생성됨` } : d));
    toast(`다시 생성되었습니다 · ${pick.word}`);
  };

  const handleAIApproveAll = () => {
    if (!aiDrafts.length) return;
    setSchedule(s => {
      let next = s.slice();
      aiDrafts.forEach(d => {
        const entry = { date: d.date, day: d.day, word: d.word, eng: d.eng, status: 'scheduled', by: 'AI · 운영팀', posts: null };
        const emptyIdx = next.findIndex(r => r.status === 'empty');
        if (emptyIdx >= 0) {
          next = next.map((r, i) => i === emptyIdx ? { ...entry, date: r.date, day: r.day } : r);
        } else {
          next = [...next, entry];
        }
      });
      return next;
    });
    toast(`${aiDrafts.length}개 키워드를 일괄 승인했습니다.`);
    setAiDrafts([]);
  };

  const handleSubmit = () => {
    if (!newWord.trim()) { toast('한글 키워드를 입력해주세요.'); return; }
    if (!newEng.trim())  { toast('영문 키워드를 입력해주세요.'); return; }
    const day = newDate || '미정';
    setSchedule(s => [...s, {
      date: day, day: '?', word: newWord.trim(), eng: newEng.trim().toUpperCase(),
      status: 'scheduled', by: user?.nickname || '운영팀', posts: null,
    }]);
    toast(`${newWord} · ${newEng.toUpperCase()} — 예약 등록 완료`);
    setNewDate(''); setNewWord(''); setNewEng(''); setNewPrompt(''); setNewCat('');
  };

  const handleAssignEmpty = (r) => {
    setNewDate(r.date);
    setNewWord(''); setNewEng('');
    suggestRef.current?.scrollIntoView({ behavior: 'smooth' });
    toast(`${r.date} 슬롯 — 키워드를 입력해주세요`);
  };

  const handleEdit = (i) => {
    setEditIdx(editIdx === i ? null : i);
  };

  const handleEditSave = (i) => {
    toast(`${schedule[i].word} — 수정 완료`);
    setEditIdx(null);
  };

  const handleEditWordChange = (i, val) => {
    setSchedule(s => s.map((r, ri) => ri === i ? {...r, word: val} : r));
  };

  const handleApprove = (idx) => {
    const s = suggestions[idx];
    setNewWord(s.w);
    setSuggestions(arr => arr.filter((_,i) => i !== idx));
    toast(`${s.w} — 폼에 불러왔습니다. 날짜를 지정해 예약하세요.`);
    suggestRef.current?.scrollIntoView({ behavior: 'smooth' });
  };

  const handleReject = (idx) => {
    const s = suggestions[idx];
    setSuggestions(arr => arr.filter((_,i) => i !== idx));
    toast(`${s.w} — 제안을 반려했습니다.`);
  };

  return (
    <div style={{overflowX:'hidden'}}>
      <TopBar active="profile" onNav={onNav} dark={dark} onToggleDark={onToggleDark} user={user} onLogout={onLogout} right={
        <div style={{display:'flex', alignItems:'center', gap:12}}>
          <span className="chip accent" style={{fontFamily:'var(--f-mono)', fontSize:10}}>ADMIN · EDITOR</span>
          <button className="dark-toggle" onClick={onToggleDark}>{dark?<IconSun/>:<IconMoon/>}</button>
          <div className="avatar" style={{width:32, height:32, fontSize:13}}>{(user?.nickname||'운')[0]}</div>
        </div>
      }/>
      <div className="wrap" style={{paddingTop:32}}>
        <div style={{display:'grid', gridTemplateColumns:'1fr auto', gap:32, alignItems:'end', paddingBottom:24, borderBottom:'1px solid var(--rule)'}}>
          <div>
            <div className="eyebrow" style={{marginBottom:10}}>CURATION · 키워드 스케줄러</div>
            <h1 style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:44, letterSpacing:'-0.025em', lineHeight:1, margin:0, color:'var(--ink)'}}>오늘 이후의 키워드</h1>
            <p style={{fontSize:14, color:'var(--ink-mute)', marginTop:10, maxWidth:'52ch', lineHeight:1.65}}>편집자가 매일 하나씩 예약 등록합니다. 매일 00:00 KST에 오늘의 키워드가 자동 발행됩니다.</p>
          </div>
          <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
            <button className="btn sm" onClick={() => suggestRef.current?.scrollIntoView({behavior:'smooth'})}>
              제안 검토 <span style={{color:'var(--accent)', marginLeft:4}}>●{suggestions.length}</span>
            </button>
            <button className="btn sm" onClick={handleAIGenerate} disabled={aiLoading}
              style={{borderColor:'var(--accent)', color:'var(--accent)'}}>
              {aiLoading ? '생성 중…' : '✦ AI로 7일치 생성'}
              {aiDrafts.length > 0 && <span style={{marginLeft:4}}>· 검수 {aiDrafts.length}</span>}
            </button>
            <button className="btn sm solid" onClick={() => suggestRef.current?.scrollIntoView({behavior:'smooth'})}>＋ 키워드 추가</button>
          </div>
        </div>

        <section style={{display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:40, padding:'22px 0', borderBottom:'1px solid var(--rule-soft)'}}>
          {[['예약된 키워드', String(schedule.filter(r=>r.status==='scheduled'||r.status==='draft').length), '일치'],['미배정 슬롯', String(schedule.filter(r=>r.status==='empty').length),'일'],['유저 제안 대기', String(suggestions.length),'건'],['평균 참여','1,584','편/일'],['다음 발행까지','14H 32M','']].map(([k,v,s]) => (
            <div key={k}>
              <div className="label" style={{fontSize:10, marginBottom:6}}>{k}</div>
              <div style={{fontFamily:'var(--f-latin)', fontWeight:700, fontSize:28, letterSpacing:'-0.04em', color:'var(--ink)', fontVariantNumeric:'tabular-nums', lineHeight:1}}>
                {v} <span style={{fontSize:12, color:'var(--ink-mute)', fontFamily:'var(--f-kr)', fontWeight:500, marginLeft:2}}>{s}</span>
              </div>
            </div>
          ))}
        </section>

        <section style={{display:'grid', gridTemplateColumns:'1fr 340px', gap:40, padding:'28px 0'}}>
          <div>
            <div className="col-h">
              <h2>앞으로 14일</h2>
              <span className="meta">DATE · WORD · STATUS · CURATED BY</span>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'90px 1fr 120px 120px 80px', gap:16, padding:'0 0 10px', borderBottom:'1px solid var(--rule)'}}>
              {['DATE','KEYWORD','STATUS','CURATED BY',''].map((h,i) => (
                <span key={i} className="label" style={{fontSize:10}}>{h}</span>
              ))}
            </div>

            {schedule.map((r, i) => {
              const st = STATUS_META[r.status];
              const isToday = r.status === 'live';
              const empty = r.status === 'empty';
              const isEditing = editIdx === i;
              return (
                <div key={i} style={{
                  display:'grid', gridTemplateColumns:'90px 1fr 120px 120px 80px',
                  gap:16, padding:'16px 0', borderBottom:'1px solid var(--rule-ghost)',
                  alignItems:'center',
                  background: isToday ? 'var(--accent-soft)' : 'transparent',
                  marginLeft: isToday ? -12 : 0, marginRight: isToday ? -12 : 0,
                  paddingLeft: isToday ? 12 : 0, paddingRight: isToday ? 12 : 0,
                }}>
                  <div>
                    <div style={{fontFamily:'var(--f-latin)', fontWeight:600, fontSize:14, color:'var(--ink)', fontVariantNumeric:'tabular-nums'}}>{r.date}</div>
                    <div className="meta" style={{fontSize:10.5}}>{r.day}요일{isToday?' · 오늘':''}</div>
                  </div>
                  <div>
                    {empty ? (
                      <button className="btn sm ghost" style={{borderStyle:'dashed'}} onClick={() => handleAssignEmpty(r)}>＋ 키워드 배정</button>
                    ) : isEditing ? (
                      <input className="field" value={r.word} onChange={e => handleEditWordChange(i, e.target.value)}
                        style={{fontSize:16, padding:'4px 8px', fontFamily:'var(--f-kr-serif)', fontWeight:700}} />
                    ) : (
                      <div style={{display:'flex', alignItems:'baseline', gap:12}}>
                        <span style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:22, letterSpacing:'-0.02em', color:'var(--ink)'}}>{r.word}</span>
                        <span style={{fontFamily:'var(--f-serif)', fontSize:12, color:'var(--ink-faint)', letterSpacing:'0.08em'}}>{r.eng}</span>
                        {r.fixed && <span className="chip" style={{fontSize:10}}>📌 {r.fixed}</span>}
                      </div>
                    )}
                  </div>
                  <div>
                    <span className="status-chip" style={{borderColor:st.c, color:st.c}}>● {st.k}</span>
                  </div>
                  <div style={{fontFamily:'var(--f-kr)', fontSize:12.5, color:empty?'var(--ink-faint)':'var(--ink-soft)'}}>
                    {r.by||'—'}
                    {r.posts!==null && <div className="meta" style={{fontSize:10.5}}>{r.posts?.toLocaleString()} 편</div>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    {!empty && !isEditing && <button className="btn sm ghost" style={{padding:'5px 10px', fontSize:10}} onClick={() => handleEdit(i)}>편집</button>}
                    {isEditing && <button className="btn sm solid" style={{padding:'5px 10px', fontSize:10}} onClick={() => handleEditSave(i)}>저장</button>}
                  </div>
                </div>
              );
            })}
          </div>

          <aside style={{display:'flex', flexDirection:'column', gap:20}}>
            <div className="panel" ref={suggestRef}>
              <h4>키워드 예약하기</h4>
              <div style={{marginBottom:12}}>
                <div className="label" style={{fontSize:10, marginBottom:4}}>발행일</div>
                <input className="field" placeholder="예) 04·30" value={newDate} onChange={e=>setNewDate(e.target.value)} />
              </div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:12}}>
                <div>
                  <div className="label" style={{fontSize:10, marginBottom:4}}>한글</div>
                  <input className="field" placeholder="예) 첫눈" value={newWord} onChange={e=>setNewWord(e.target.value)} />
                </div>
                <div>
                  <div className="label" style={{fontSize:10, marginBottom:4}}>영문</div>
                  <input className="field" placeholder="FIRST SNOW" value={newEng} onChange={e=>setNewEng(e.target.value)} />
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <div className="label" style={{fontSize:10, marginBottom:4}}>프롬프트 (선택)</div>
                <textarea className="field" placeholder="오늘의 키워드 아래에 보여줄 안내 문구" value={newPrompt} onChange={e=>setNewPrompt(e.target.value)}
                  style={{minHeight:72, resize:'none', border:'none', borderBottom:'1px solid var(--rule-soft)', outline:'none', background:'transparent', fontFamily:'var(--f-kr)', fontSize:14, color:'var(--ink)', width:'100%'}} />
              </div>
              <div style={{display:'flex', gap:8, marginBottom:14, flexWrap:'wrap'}}>
                {['감정','계절','장소','시간','관계'].map(c => (
                  <button key={c} className={`chip${newCat===c?' active':''}`} onClick={() => setNewCat(newCat===c?'':c)}>{c}</button>
                ))}
              </div>
              <button className="btn accent" style={{width:'100%', justifyContent:'center'}} onClick={handleSubmit}>예약 등록</button>
            </div>

            <div className="panel" ref={aiRef} style={{borderColor:aiDrafts.length?'var(--accent)':undefined}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6}}>
                <h4 style={{margin:0}}>✦ AI 검수 대기 · {aiDrafts.length}</h4>
                {aiDrafts.length > 0 && (
                  <button className="btn sm" style={{padding:'4px 10px', fontSize:10, color:'var(--accent)', borderColor:'var(--accent)'}} onClick={handleAIApproveAll}>전체 승인</button>
                )}
              </div>
              <div className="meta" style={{fontSize:10.5, marginBottom:10}}>일주일치를 미리 생성하고 한 건씩 검수하세요. 이미 사용된 키워드는 자동 제외됩니다.</div>
              {aiLoading && (
                <div style={{padding:'24px 0', textAlign:'center', color:'var(--ink-mute)', fontFamily:'var(--f-mono)', fontSize:11.5}}>
                  AI가 키워드를 생성하는 중…
                </div>
              )}
              {!aiLoading && aiDrafts.length === 0 && (
                <div style={{padding:'16px 0', textAlign:'center', color:'var(--ink-mute)', fontFamily:'var(--f-mono)', fontSize:11}}>
                  검수 대기 중인 초안이 없습니다.<br/>
                  <button className="btn sm" style={{marginTop:10, color:'var(--accent)', borderColor:'var(--accent)'}} onClick={handleAIGenerate} disabled={aiLoading}>지금 생성</button>
                </div>
              )}
              {aiDrafts.map((d, i) => (
                <div key={i} style={{padding:'10px 0', borderBottom:'1px solid var(--rule-ghost)'}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', gap:8}}>
                    <div style={{minWidth:0, flex:1}}>
                      <div style={{display:'flex', alignItems:'baseline', gap:8}}>
                        <span className="meta" style={{fontSize:10, fontFamily:'var(--f-mono)'}}>{d.date} · {d.day}</span>
                      </div>
                      <div style={{display:'flex', alignItems:'baseline', gap:8, marginTop:2}}>
                        <span style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:17, color:'var(--ink)'}}>{d.word}</span>
                        <span style={{fontFamily:'var(--f-serif)', fontSize:11, color:'var(--ink-faint)', letterSpacing:'0.08em'}}>{d.eng}</span>
                      </div>
                    </div>
                    <div style={{display:'flex', gap:4, flexShrink:0}}>
                      <button className="btn sm ghost" style={{padding:'4px 8px', fontSize:10, color:'var(--accent)'}}
                        onClick={() => handleAIApprove(i)} title="승인">✓</button>
                      <button className="btn sm ghost" style={{padding:'4px 8px', fontSize:10}}
                        onClick={() => handleAIRegenerate(i)} title="다시 생성">↻</button>
                      <button className="btn sm ghost" style={{padding:'4px 8px', fontSize:10}}
                        onClick={() => handleAIReject(i)} title="반려">✕</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <div className="panel">
              <h4>유저 제안 대기 · {suggestions.length}</h4>
              {suggestions.length === 0 && (
                <div style={{padding:'16px 0', textAlign:'center', color:'var(--ink-mute)', fontFamily:'var(--f-mono)', fontSize:11}}>대기 중인 제안이 없습니다.</div>
              )}
              {suggestions.map((s,i) => (
                <div key={i} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 0', borderBottom:'1px solid var(--rule-ghost)'}}>
                  <div>
                    <div style={{fontFamily:'var(--f-kr-serif)', fontWeight:700, fontSize:15, color:'var(--ink)'}}>{s.w}</div>
                    <div className="meta" style={{fontSize:10.5}}>{s.by} · ♥ {s.v}</div>
                  </div>
                  <div style={{display:'flex', gap:4}}>
                    <button className="btn sm ghost" style={{padding:'4px 8px', fontSize:10, color:'var(--accent)'}} onClick={() => handleApprove(i)}>✓</button>
                    <button className="btn sm ghost" style={{padding:'4px 8px', fontSize:10}} onClick={() => handleReject(i)}>✕</button>
                  </div>
                </div>
              ))}
              {suggestions.length > 0 && (
                <button className="btn sm" style={{width:'100%', justifyContent:'center', marginTop:12}}
                  onClick={() => toast('전체 제안 목록 — 준비 중입니다.')}>전체 보기 →</button>
              )}
            </div>

            <div className="panel" style={{background:'var(--paper-2)'}}>
              <h4>발행 로직</h4>
              <div style={{fontFamily:'var(--f-mono)', fontSize:11, color:'var(--ink-soft)', lineHeight:1.75}}>
                <div>00:00 KST · 매일 자동 발행</div>
                <div>↓</div>
                <div>scheduled_date = today()</div>
                <div>↓ 없으면</div>
                <div>status = 'empty' · 운영 알림</div>
                <div>↓ 폴백</div>
                <div>과거 인기 키워드 재활용</div>
              </div>
            </div>
          </aside>
        </section>
      </div>
    </div>
  );
};

/* ══════════════════════════════
   APP ROOT
══════════════════════════════ */
const App = () => {
  const toast = useToast();

  const [screen, setScreen]   = useState(() => localStorage.getItem('wh_logged_in') ? 'feed' : 'login');
  const [dark, setDark]       = useState(() => localStorage.getItem('wh_dark') === '1');
  const [posts, setPosts]     = useState(() => {
    try {
      const saved = localStorage.getItem('wh_posts');
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length) return parsed;
      }
    } catch {}
    return INITIAL_POSTS;
  });
  const [activePost, setPost]         = useState(null);
  const [activeProfile, setProfile]   = useState(null); // null = own profile, or {handle,author,initial,bio}
  const [user, setUser]       = useState(() => {
    const saved = localStorage.getItem('wh_logged_in');
    if (!saved) return null;
    try {
      const profile = JSON.parse(localStorage.getItem('wh_profile') || '{}');
      return {
        nickname: profile.nickname || '김민지',
        email:    profile.email    || DEMO_EMAIL,
        bio:      profile.bio      || '매일 한 줄, 주로 저녁에. 조용한 것들에 대해 씁니다.',
      };
    } catch { return { nickname:'김민지', email:DEMO_EMAIL, bio:'매일 한 줄, 주로 저녁에. 조용한 것들에 대해 씁니다.' }; }
  });

  useEffect(() => {
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('wh_dark', dark ? '1' : '0');
  }, [dark]);

  /* ── Font preset ── */
  const [fontPreset, setFontPreset] = useState(() => localStorage.getItem('wh_font') || '2');
  useEffect(() => {
    ['font-1','font-2','font-3','font-4'].forEach(c => document.body.classList.remove(c));
    document.body.classList.add(`font-${fontPreset}`);
    try { localStorage.setItem('wh_font', fontPreset); } catch {}
  }, [fontPreset]);

  useEffect(() => {
    if (user) {
      try { localStorage.setItem('wh_profile', JSON.stringify(user)); } catch {}
    }
  }, [user]);

  const onUpdateUser = (patch) => setUser(u => ({ ...u, ...patch }));

  /* ── Onboarding ── shown to first-time users after signup */
  const [onboarded, setOnboarded] = useState(() => localStorage.getItem('wh_onboarded') === '1');
  const onCompleteOnboarding = () => {
    try { localStorage.setItem('wh_onboarded', '1'); } catch {}
    setOnboarded(true);
  };
  const onSkipOnboarding = onCompleteOnboarding;

  /* ── Notification preferences ── */
  const [prefs, setPrefs] = useState(() => {
    try { return { ...{emailDigest:true, notifLike:true, notifComment:true, notifFollow:true, notifSystem:true},
                  ...(JSON.parse(localStorage.getItem('wh_prefs') || '{}')) }; }
    catch { return {emailDigest:true, notifLike:true, notifComment:true, notifFollow:true, notifSystem:true}; }
  });
  useEffect(() => { try { localStorage.setItem('wh_prefs', JSON.stringify(prefs)); } catch {} }, [prefs]);
  const onUpdatePrefs = (patch) => setPrefs(p => ({...p, ...patch}));

  const onDeleteAccount = () => {
    /* clear EVERYTHING */
    ['wh_logged_in','wh_profile','wh_posts','wh_comments','wh_follows','wh_blocks','wh_reports','wh_notifications','wh_prefs','wh_draft','wh_onboarded'].forEach(k => {
      try { localStorage.removeItem(k); } catch {}
    });
    setUser(null);
    setPosts(INITIAL_POSTS);
    setBlocks(new Set());
    setFollows(new Set());
    setNotifications([]);
    setEditingPost(null);
    setOnboarded(false);
    setScreen('login');
    toast('계정이 삭제되었습니다.');
  };

  const onExportData = () => {
    const data = {
      profile: user,
      posts: posts.filter(p => p.handle === user?.handle || p.author === user?.nickname),
      comments: JSON.parse(localStorage.getItem('wh_comments') || '{}'),
      follows: [...follows],
      blocks: [...blocks],
      prefs,
      exportedAt: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `writehabit-${user?.handle || 'data'}-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('데이터가 다운로드되었습니다.');
  };

  /* ── Notifications ── */
  const [notifications, setNotifications] = useState(() => {
    try {
      const saved = localStorage.getItem('wh_notifications');
      if (saved) return JSON.parse(saved);
    } catch {}
    /* seed with sample notifications on first run */
    return [
      {id:1, type:'like',    actor:{name:'정윤',     handle:'yoonn',   initial:'정'}, target:{type:'post', title:'서른의 이별은 조금 다른 얼굴을 하고 있다'}, time:'12분 전', read:false},
      {id:2, type:'comment', actor:{name:'박서연',   handle:'seoyeon', initial:'박'}, target:{type:'post', title:'서른의 이별은 조금 다른 얼굴을 하고 있다'}, preview:'문장이 너무 정확해서 한참 멈춰 있었습니다.', time:'34분 전', read:false},
      {id:3, type:'follow',  actor:{name:'한지우',   handle:'jiwoo',   initial:'한'}, time:'1시간 전', read:false},
      {id:4, type:'like',    actor:{name:'김도현',   handle:'dohyun',  initial:'김'}, target:{type:'post', title:'서른의 이별은 조금 다른 얼굴을 하고 있다'}, time:'2시간 전', read:true},
      {id:5, type:'system',  text:'오늘의 키워드가 발행되었습니다. 글을 남겨보세요.', time:'오늘 00:00', read:true},
    ];
  });
  useEffect(() => {
    try { localStorage.setItem('wh_notifications', JSON.stringify(notifications)); } catch {}
  }, [notifications]);
  const onMarkAllRead = () => setNotifications(ns => ns.map(n => ({...n, read:true})));
  const onMarkRead    = (id) => setNotifications(ns => ns.map(n => n.id === id ? {...n, read:true} : n));
  const onClearNotifications = () => {
    if (!window.confirm('모든 알림을 삭제할까요?')) return;
    setNotifications([]);
  };
  const onNotificationClick = (n) => {
    onMarkRead(n.id);
    if (n.type === 'follow') onNav('profile');
    else if (n.target?.type === 'post') {
      const p = posts.find(x => x.title === n.target.title) || posts[0];
      if (p) onNav('detail', p);
    }
  };

  /* ── Blocks ── */
  const [blocks, setBlocks] = useState(() => _readBlocks());
  const onBlockAuthor = (handle) => {
    setBlocks(prev => {
      const next = new Set(prev);
      if (next.has(handle)) { next.delete(handle); toast(`@${handle} 차단을 해제했습니다.`); }
      else                  { next.add(handle);    toast(`@${handle}님의 글과 댓글이 더 이상 표시되지 않습니다.`); }
      _writeBlocks(next);
      return next;
    });
  };
  const [follows, setFollows] = useState(() => _readFollows());
  const onToggleFollow = (handle) => {
    setFollows(prev => {
      const next = new Set(prev);
      if (next.has(handle)) { next.delete(handle); toast(`@${handle} 팔로우를 취소했습니다.`); }
      else                  { next.add(handle);    toast(`@${handle} 을(를) 팔로우합니다.`); }
      _writeFollows(next);
      return next;
    });
  };
  const onReport = ({ targetType, targetId, targetHandle, reason, detail }) => {
    const reports = _readReports();
    reports.unshift({
      id: Date.now(), targetType, targetId, targetHandle, reason, detail: detail || '',
      reporter: user?.handle || 'anonymous', at: new Date().toISOString(),
    });
    _writeReports(reports);
    toast('신고가 접수되었습니다. 운영진이 24시간 내 확인합니다.');
  };

  useEffect(() => {
    try { localStorage.setItem('wh_posts', JSON.stringify(posts)); } catch {}
  }, [posts]);

  const isPoppingRef = useRef(false);

  useEffect(() => {
    history.replaceState({ screen, postId: activePost?.id ?? null }, '');
    const onPop = (e) => {
      isPoppingRef.current = true;
      const s = e.state?.screen || (localStorage.getItem('wh_logged_in') ? 'feed' : 'login');
      const pid = e.state?.postId ?? null;
      setScreen(s);
      if (s === 'detail' && pid != null) {
        const found = posts.find(p => p.id === pid);
        if (found) setPost(found);
      }
      window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
      setTimeout(() => { isPoppingRef.current = false; }, 0);
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, [posts, activePost, screen]);

  const onNav = (target, data) => {
    setScreen(target);
    if (target === 'detail' && data) setPost(data);
    if (target === 'profile') {
      const myHandle = user?.handle || sanitizeHandle(user?.nickname || '');
      setProfile(data && data.handle !== myHandle ? data : null);
    }
    if (!isPoppingRef.current) {
      history.pushState({ screen: target, postId: target === 'detail' ? data?.id ?? null : null }, '');
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const onToggleDark = () => setDark(d => !d);

  const onToggleLike = (id) => {
    setPosts(ps => ps.map(p => p.id === id
      ? { ...p, liked: !p.liked, likes: p.liked ? p.likes - 1 : p.likes + 1 }
      : p
    ));
  };

  const onToggleBookmark = (id) => {
    setPosts(ps => ps.map(p => p.id === id
      ? { ...p, bookmarked: !p.bookmarked, bookmarks: p.bookmarked ? p.bookmarks - 1 : p.bookmarks + 1 }
      : p
    ));
  };

  const onPublish = ({ title, body }) => {
    const name = user?.nickname || '김민지';
    const h    = user?.handle || name.toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9가-힣ㄱ-ㅎㅏ-ㅣ]/g,'') || 'user';
    /* 한글 기준 분당 약 350자 읽기 속도 */
    const readMin = Math.max(1, Math.ceil((body || '').length / 350));
    const newPost = {
      id: Date.now(), title, body,
      author: name, handle: h,
      initial: name[0],
      time: '방금 전', read: `${readMin}분`,
      likes: 0, comments: 0, bookmarks: 0, liked: false,
    };
    setPosts(ps => [newPost, ...ps]);
  };

  const [editingPost, setEditingPost] = useState(null);

  const onUpdatePost = (id, { title, body }) => {
    const readMin = Math.max(1, Math.ceil((body || '').length / 350));
    setPosts(ps => ps.map(p => p.id === id
      ? { ...p, title, body, read: `${readMin}분`, edited: true }
      : p
    ));
    /* keep activePost in sync if user is currently viewing this post */
    setPost(prev => prev?.id === id ? { ...prev, title, body, read: `${readMin}분`, edited: true } : prev);
  };

  const onDeletePost = (id) => {
    setPosts(ps => ps.filter(p => p.id !== id));
    /* clear comments tied to this post */
    try {
      const all = JSON.parse(localStorage.getItem('wh_comments') || '{}');
      delete all[id];
      localStorage.setItem('wh_comments', JSON.stringify(all));
    } catch {}
  };

  const onEditPost = (post) => {
    setEditingPost(post);
    onNav('write');
  };

  const onLogin = (userData) => {
    setUser(userData);
    setScreen('feed');
    toast(`환영합니다, ${userData.nickname}님!`);
  };

  const onLogout = () => {
    localStorage.removeItem('wh_logged_in');
    setUser(null);
    setScreen('login');
    toast('로그아웃되었습니다.');
  };

  if (screen === 'login') {
    return <LoginScreen onLogin={onLogin} />;
  }

  const commonProps = { onNav, dark, onToggleDark };

  return (
    <div>
      {!onboarded && user && (
        <OnboardingOverlay onDone={onCompleteOnboarding} onSkip={onSkipOnboarding} onNav={onNav} />
      )}
      {screen !== 'write' && screen !== 'admin' && (
        <TopBar active={screen} {...commonProps} user={user} onLogout={onLogout}
          notifications={notifications}
          onMarkAllRead={onMarkAllRead}
          onClearNotifications={onClearNotifications}
          onNotificationClick={onNotificationClick} />
      )}

      {screen === 'feed'    && <FeedScreen    {...commonProps} posts={posts.filter(p => !blocks.has(p.handle))}
                                  onToggleLike={onToggleLike} onToggleBookmark={onToggleBookmark}
                                  blocks={blocks} follows={follows} onToggleFollow={onToggleFollow}
                                  onReport={onReport} onBlockAuthor={onBlockAuthor} />}
      {screen === 'write'   && <WriteScreen   {...commonProps} onPublish={onPublish} user={user}
                                  editingPost={editingPost}
                                  onUpdatePost={onUpdatePost}
                                  onClearEditing={() => setEditingPost(null)} />}
      {screen === 'detail'  && <DetailScreen  {...commonProps} post={activePost} posts={posts}
                                  onToggleLike={onToggleLike} onToggleBookmark={onToggleBookmark}
                                  user={user} onEditPost={onEditPost} onDeletePost={onDeletePost}
                                  blocks={blocks} follows={follows} onToggleFollow={onToggleFollow}
                                  onReport={onReport} onBlockAuthor={onBlockAuthor} />}
      {screen === 'profile' && <ProfileScreen {...commonProps} posts={posts} user={user} onLogout={onLogout}
                                  viewUser={activeProfile}
                                  onUpdateUser={onUpdateUser}
                                  onEditPost={onEditPost} onDeletePost={onDeletePost}
                                  blocks={blocks} follows={follows} onToggleFollow={onToggleFollow}
                                  onBlockAuthor={onBlockAuthor} />}
      {screen === 'archive' && <ArchiveScreen {...commonProps} user={user} onLogout={onLogout} />}
      {screen === 'admin'   && <AdminScreen   {...commonProps} user={user} onLogout={onLogout} />}
      {screen === 'settings' && <SettingsScreen {...commonProps} user={user} prefs={prefs}
                                  onUpdatePrefs={onUpdatePrefs} onLogout={onLogout}
                                  onExportData={onExportData} onDeleteAccount={onDeleteAccount} />}

      <footer style={{borderTop:'1px solid var(--rule-ghost)', padding:'24px 56px', display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:40}}>
        <div style={{display:'flex', gap:24, alignItems:'center'}}>
          <Logo onClick={() => onNav('feed')} small />
          <span className="meta" style={{fontSize:10}}>© 2026 WriteHabit</span>
        </div>
        <div style={{display:'flex', gap:20, fontFamily:'var(--f-mono)', fontSize:10.5, color:'var(--ink-mute)'}}>
          <span style={{cursor:'pointer'}}>이용약관</span>
          <span style={{cursor:'pointer'}}>개인정보처리방침</span>
          <button onClick={() => onNav('admin')} style={{background:'none', border:'none', cursor:'pointer', fontFamily:'var(--f-mono)', fontSize:10.5, color:'var(--ink-faint)'}}>Admin ↗</button>
        </div>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App /></ToastProvider>
);
</script>
</body>
</html>
